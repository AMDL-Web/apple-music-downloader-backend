<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMDL Downloader - Apple Music 下载控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 背景流光效果 -->
    <div class="mesh-gradient"></div>

    <div class="app-container">
        <!-- 头部区域 -->
        <header class="app-header">
            <div class="header-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                </div>
                <div class="logo-text">
                    <h1>AMDL <span>Downloader</span></h1>
                    <p class="subtitle">Apple Music Core 下载服务控制台</p>
                </div>
            </div>

            <!-- 系统状态 -->
            <div class="system-status" id="system-status">
                <div class="status-indicator">
                    <span class="status-dot status-checking" id="conn-dot"></span>
                    <span class="status-label" id="conn-text">正在连接后端...</span>
                </div>
                <div class="capabilities-pills" id="capabilities-pills">
                    <!-- 动态生成: ffmpeg, MP4Box 等依赖状态 -->
                </div>
            </div>
        </header>

        <main class="app-main">
            <!-- 左侧/上方: 控制面板与提交 -->
            <section class="control-panel card animate-fade-in">
                <div class="card-header">
                    <h2><svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> 新建下载任务</h2>
                </div>
                <form id="download-form" class="download-form">
                    <div class="input-group">
                        <label for="music-url">Apple Music 链接 (单曲、专辑、歌单)</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                            <input type="url" id="music-url" placeholder="https://music.apple.com/..." required autocomplete="off">
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="force-download">
                            <span class="checkmark"></span>
                            <span class="label-text">强制重新下载 (忽略已存在的文件)</span>
                        </label>
                    </div>

                    <button type="submit" id="submit-btn" class="btn-primary">
                        <span>提交下载任务</span>
                        <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    </button>
                </form>
            </section>

            <!-- 数据统计概览 -->
            <section class="stats-grid animate-fade-in" style="animation-delay: 0.1s;">
                <div class="stat-card">
                    <div class="stat-info">
                        <span class="stat-title">全部任务</span>
                        <span class="stat-value" id="stat-total">0</span>
                    </div>
                    <div class="stat-icon bg-blue">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 002-2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <span class="stat-title">正在下载</span>
                        <span class="stat-value text-blue" id="stat-active">0</span>
                    </div>
                    <div class="stat-icon bg-blue-light text-blue">
                        <svg class="spin-slow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17"></path></svg>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <span class="stat-title">已完成</span>
                        <span class="stat-value text-green" id="stat-completed">0</span>
                    </div>
                    <div class="stat-icon bg-green-light text-green">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <span class="stat-title">已失败 / 取消</span>
                        <span class="stat-value text-red" id="stat-failed">0</span>
                    </div>
                    <div class="stat-icon bg-red-light text-red">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                </div>
            </section>

            <!-- 右侧/下方: 任务列表 -->
            <section class="jobs-panel card animate-fade-in" style="animation-delay: 0.2s;">
                <div class="card-header list-header">
                    <h2><svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg> 任务历史</h2>
                    <div class="list-actions">
                        <button id="refresh-btn" class="btn-secondary btn-icon-only" title="刷新列表">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17"></path></svg>
                        </button>
                    </div>
                </div>

                <div class="jobs-list" id="jobs-list">
                    <!-- 列表骨架屏 / 加载状态 -->
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p>正在获取任务列表...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 弹窗: 任务详情与音轨列表 -->
    <div class="modal" id="details-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-group">
                    <h3 id="modal-job-title">任务详情</h3>
                    <p id="modal-job-sub" class="modal-subtitle">获取中...</p>
                </div>
                <button class="modal-close" id="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <!-- 任务进度大卡片 -->
                <div class="job-meta-hero" id="modal-job-hero">
                    <div class="hero-progress-ring">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="circle" id="modal-hero-circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                        <div class="percentage" id="modal-hero-percent">0%</div>
                    </div>
                    <div class="hero-details">
                        <div class="hero-stat-row">
                            <span class="label">任务 ID:</span>
                            <span class="value code" id="modal-hero-id">-</span>
                        </div>
                        <div class="hero-stat-row">
                            <span class="label">来源 URL:</span>
                            <span class="value text-truncate" id="modal-hero-url">-</span>
                        </div>
                        <div class="hero-stat-row">
                            <span class="label">总音轨数:</span>
                            <span class="value" id="modal-hero-tracks">0</span>
                        </div>
                        <div class="hero-stat-row">
                            <span class="label">状态:</span>
                            <span class="value" id="modal-hero-status">-</span>
                        </div>
                    </div>
                </div>

                <!-- 音轨列表 -->
                <div class="track-section">
                    <h4>音轨列表 (<span id="modal-track-count">0</span>)</h4>
                    <div class="track-list" id="modal-track-list">
                        <!-- 动态载入 track 列表 -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" id="modal-cancel-job-btn" style="display: none;">取消此下载任务</button>
                <button class="btn-secondary" id="modal-close-footer-btn">关闭</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
