openapi: 3.1.0
info:
  title: AMDL Backend API
  version: 1.0.0
  description: |
    Apple Music 下载任务与 wrapper-manager 管理接口。

    多用户模式（auth.enabled 为 true）下，后端信任反向代理注入的 X-User / X-Email 头解析身份；
    未注册或被禁用的用户返回 403。auth.enabled 为 false 时所有请求视为内置管理员。
    Wrapper 与 Users 分组接口仅管理员可用；普通用户只能访问自己的下载任务，
    访问他人任务一律返回 404。
servers:
  - url: /
tags:
  - name: System
  - name: Users
  - name: Wrapper
  - name: Quality
  - name: Downloads
paths:
  /api/v1/health:
    get:
      tags: [System]
      summary: 后端健康检查
      operationId: getHealth
      responses:
        '200':
          description: 后端可用。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: 本地数据库不可用。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/capabilities:
    get:
      tags: [System]
      summary: 查询下载能力和外部工具
      operationId: getCapabilities
      responses:
        '200':
          description: 当前配置与工具可用性。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilitiesResponse'
  /api/v1/me:
    get:
      tags: [Users]
      summary: 查询当前登录用户
      description: 返回当前身份的用户名、角色和头像，供前端渲染。单用户模式返回内置管理员。
      operationId: getMe
      responses:
        '200':
          description: 当前用户信息。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/me/config:
    get:
      tags: [Users]
      summary: 查询当前用户的配置覆盖
      description: |
        返回当前用户存储的配置覆盖层（config）及其套用到全局配置后的生效下载配置（effective）。
        配置解析顺序为：请求级 config > 用户级配置 > config.yaml 全局保底；
        本接口不含请求级覆盖，请求级仅在提交下载时逐次生效。
      operationId: getMyConfig
      responses:
        '200':
          description: 用户配置覆盖与生效配置。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyConfigResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      tags: [Users]
      summary: 替换当前用户的配置覆盖
      description: 整体替换当前用户的覆盖层；提交 {} 清空。未知字段或非法取值返回 400。单用户模式（auth 关闭）无用户档案，返回 409。
      operationId: putMyConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadOverrides'
      responses:
        '200':
          description: 更新后的用户配置覆盖与生效配置。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyConfigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: 单用户模式下不支持按用户配置。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/users:
    get:
      tags: [Users]
      summary: 列出用户（仅管理员）
      operationId: listUsers
      responses:
        '200':
          description: 用户列表。
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      summary: 创建用户（仅管理员）
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: 用户已创建。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: 用户名、别名或邮箱已被占用。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/users/{user_id}:
    get:
      tags: [Users]
      summary: 查询用户（仅管理员）
      operationId: getUser
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: 用户详情。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Users]
      summary: 更新用户（仅管理员）
      description: 部分更新，仅提交的字段生效；aliases / emails 提交时整组替换。
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/UserID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 更新后的用户。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 别名或邮箱已被占用。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Users]
      summary: 禁用用户（仅管理员）
      description: 软禁用（enabled=false），保留任务归属供审计；不物理删除。
      operationId: disableUser
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: 用户已禁用。
          content:
            application/json:
              schema:
                type: object
                required: [status, id]
                properties:
                  status:
                    type: string
                    const: disabled
                  id:
                    type: string
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/wrapper/status:
    get:
      tags: [Wrapper]
      summary: 查询 wrapper-manager 状态（仅管理员）
      description: 探测 wrapper-manager 连通性与登录/区域等运行状态；下载前或账号管理前使用。
      operationId: getWrapperStatus
      responses:
        '200':
          description: Wrapper 状态。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrapperStatus'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/wrapper/login:
    post:
      tags: [Wrapper]
      summary: 登录 wrapper 账号
      description: 登录可能直接成功，也可能返回 login_id 要求两步验证码。
      operationId: loginWrapper
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedInResponse'
        '202':
          description: 需要提交两步验证码。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeedsTwoStepResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
  /api/v1/wrapper/login/{login_id}/2fa:
    post:
      tags: [Wrapper]
      summary: 提交两步验证码
      operationId: submitWrapperTwoStepCode
      parameters:
        - $ref: '#/components/parameters/LoginID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoStepRequest'
      responses:
        '200':
          description: 登录成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedInResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
  /api/v1/wrapper/logout:
    post:
      tags: [Wrapper]
      summary: 登出 wrapper 账号
      operationId: logoutWrapper
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: 登出成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedOutResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
  /api/v1/quality:
    post:
      tags: [Quality]
      summary: 查询歌曲可用音质
      description: 解析 Apple Music 单曲 URL 或带 i 参数的专辑 URL，返回可用 codec、码率、采样率和位深摘要；不会创建下载任务。
      operationId: queryQuality
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QualityRequest'
      responses:
        '200':
          description: 可用音质摘要。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/downloads:
    get:
      tags: [Downloads]
      summary: 列出下载任务
      operationId: listDownloads
      description: 普通用户仅返回自己的任务；管理员返回全部任务，可用 user 参数按用户名过滤。
      parameters:
        - name: limit
          in: query
          description: 返回数量，默认 50，最大 200。
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: user
          in: query
          description: 仅管理员有效：按用户名过滤；未知用户名返回空列表。
          schema:
            type: string
      responses:
        '200':
          description: 下载任务列表。
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Downloads]
      summary: 批量创建下载任务
      description: |
        每个 URL 独立校验与入队，返回逐条结果。三层去重（请求内、活跃任务、数据库唯一索引）
        按用户隔离：不同用户可同时下载相同内容到各自目录。单次最多 100 个 URL；
        数组元素内的换行、空格、逗号、分号会被进一步拆分。
      operationId: createDownload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadRequest'
      responses:
        '202':
          description: 至少一个 URL 已入队；逐条结果见 results。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchSubmitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: 所有 URL 均被拒绝；逐条原因见 results。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchSubmitResponse'
        '500':
          description: 批次未被处理（基础设施故障，如用户配置加载失败）；与逐条 invalid 拒绝不同，可安全重试。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/downloads/{job_id}:
    get:
      tags: [Downloads]
      summary: 查询下载任务详情
      operationId: getDownload
      parameters:
        - $ref: '#/components/parameters/JobID'
      responses:
        '200':
          description: 任务、任务项与重试策略。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/downloads/{job_id}/cancel:
    post:
      tags: [Downloads]
      summary: 取消下载任务
      operationId: cancelDownload
      parameters:
        - $ref: '#/components/parameters/JobID'
      responses:
        '200':
          description: 任务已取消。
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: cancelled
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/downloads/{job_id}/events:
    get:
      tags: [Downloads]
      summary: 订阅下载任务事件
      description: Server-Sent Events 流，支持 Last-Event-ID 断点续接。
      operationId: streamDownloadEvents
      parameters:
        - $ref: '#/components/parameters/JobID'
        - name: Last-Event-ID
          in: header
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE 事件流。
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    LoginID:
      name: login_id
      in: path
      required: true
      schema:
        type: string
      example: 4f0f2c79acda4c28b69ebf4f702f8a51
    JobID:
      name: job_id
      in: path
      required: true
      schema:
        type: string
      example: job_01JZ0000000000000000000000
    UserID:
      name: user_id
      in: path
      required: true
      schema:
        type: string
      example: user_01JZ0000000000000000000000
  responses:
    BadRequest:
      description: 请求参数错误。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 登录或验证码错误。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 身份未注册、已禁用或权限不足。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 资源不存在或登录会话已过期。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 账号已经登录或会话正在验证。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: wrapper-manager 返回异常。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: 服务暂时不可用。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    GatewayTimeout:
      description: wrapper 登录超时。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: 服务器内部错误。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
        storefront:
          type: string
        supported_storefronts:
          type: array
          items:
            type: string
    WrapperStatus:
      type: object
      required: [ready, status, regions, client_count, accounts_supported]
      properties:
        ready:
          type: boolean
        status:
          type: boolean
        regions:
          type: array
          items:
            type: string
        client_count:
          type: integer
          format: int32
        accounts_supported:
          type: boolean
          description: Whether wrapper-manager returned the optional accounts field; false means the connected manager version does not support it.
        accounts:
          type: array
          description: Logged-in wrapper account identifiers when supported by wrapper-manager.
          items:
            type: string
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        database_error:
          type: string
    ToolCapability:
      type: object
      required: [name, available]
      properties:
        name:
          type: string
        available:
          type: boolean
        path:
          type: string
        error:
          type: string
    RetryPolicy:
      type: object
      required: [operation_retries, first_codec_retries, fallback_codec_retries]
      properties:
        operation_retries:
          type: integer
        first_codec_retries:
          type: integer
        fallback_codec_retries:
          type: integer
    CapabilitiesResponse:
      type: object
      required: [api, supported_inputs, unsupported_inputs, quality_priority, codec_alternative, fallback_codec, album_track_url_mode, retry_policy, tools]
      properties:
        api:
          type: string
        supported_inputs:
          type: array
          items:
            type: string
        unsupported_inputs:
          type: array
          items:
            type: string
        quality_priority:
          type: array
          items:
            type: string
        codec_alternative:
          type: boolean
        fallback_codec:
          type: string
        album_track_url_mode:
          type: string
        retry_policy:
          $ref: '#/components/schemas/RetryPolicy'
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolCapability'
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          writeOnly: true
          example: example-password
    TwoStepRequest:
      type: object
      required: [two_step_code]
      properties:
        two_step_code:
          type: string
          example: '123456'
    LogoutRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
          example: user@example.com
    LoggedInResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: logged_in
    NeedsTwoStepResponse:
      type: object
      required: [status, login_id]
      properties:
        status:
          type: string
          const: needs_2fa
        login_id:
          type: string
    LoggedOutResponse:
      type: object
      required: [status, username]
      properties:
        status:
          type: string
          const: logged_out
        username:
          type: string
    DownloadRequest:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          maxItems: 100
          items:
            type: string
            format: uri
          example: ["https://music.apple.com/cn/album/example/123456789?i=987654321"]
        force:
          type: boolean
          default: false
        config:
          allOf:
            - $ref: '#/components/schemas/DownloadOverrides'
          description: 请求级配置覆盖，仅对本次提交的任务生效，优先级高于用户级配置。
    DownloadOverrides:
      type: object
      description: |
        下载配置覆盖层：所有字段可选，未提交的字段继承下层配置
        （请求级 > 用户级 > config.yaml 全局保底）。各字段含义与
        config.yaml 的 download 段一致；downloads_dir / temp_dir /
        max_running_jobs 为系统字段，不可覆盖。未知字段返回 400。
      properties:
        quality_priority:
          type: array
          items:
            type: string
            enum: [alac, aac, aac-binaural, aac-downmix, ec3, ac3]
          description: 音质优先级，按顺序尝试；至少一项。
        codec_alternative:
          type: boolean
          description: 首选编码不可用时是否顺延尝试后续编码。
        max_parallel_tracks:
          type: integer
          minimum: 1
          maximum: 16
          description: 单任务内并行下载曲目数。
        retries:
          type: integer
          minimum: 0
          maximum: 10
          description: 各阶段操作重试次数。
        songs_folder_name: {type: string}
        albums_folder_name: {type: string}
        playlists_folder_name: {type: string}
        artists_folder_name: {type: string}
        cover_size:
          type: string
          pattern: '^[1-9][0-9]{1,4}x[1-9][0-9]{1,4}$'
          example: 5000x5000
        cover_format:
          type: string
          enum: [jpg, jpeg, png]
        embed_cover: {type: boolean}
        save_album_cover: {type: boolean}
        save_artist_cover: {type: boolean}
        save_playlist_cover: {type: boolean}
        embed_lyrics: {type: boolean}
        save_lyrics_file: {type: boolean}
        lyrics_format:
          type: string
          enum: [lrc, ttml]
        lyrics_type:
          type: string
          enum: [lyrics, syllable-lyrics]
        lyrics_extras:
          type: array
          items:
            type: string
            enum: [translation, pronunciation]
        artist_folder_format: {type: string}
        album_folder_format: {type: string}
        song_file_format: {type: string}
        playlist_folder_format: {type: string}
        playlist_song_file_format: {type: string}
        alac_max_sample_rate:
          type: integer
          minimum: 1
          description: Hz。
        alac_max_bit_depth:
          type: integer
          minimum: 1
        check_integrity: {type: boolean}
    MyConfigResponse:
      type: object
      required: [config, effective]
      properties:
        config:
          allOf:
            - $ref: '#/components/schemas/DownloadOverrides'
          description: 当前用户存储的覆盖层；未设置时为 {}。
        effective:
          type: object
          description: 覆盖层套用到全局配置后的生效下载配置；不含系统字段（downloads_dir、temp_dir、max_running_jobs）。
    SubmitResult:
      type: object
      required: [url, status]
      properties:
        url:
          type: string
        status:
          type: string
          enum: [accepted, invalid, duplicate_in_request, duplicate_active, queue_full]
        job:
          $ref: '#/components/schemas/Job'
        existing_job_id:
          type: string
          description: status 为 duplicate_active 时指向已存在的活跃任务。
        error:
          type: string
    BatchSubmitResponse:
      type: object
      required: [accepted, rejected, results]
      properties:
        accepted:
          type: integer
        rejected:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/SubmitResult'
    QualityRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          example: https://music.apple.com/cn/album/one-last-kiss/1542953969?i=1542953977
    QualitySong:
      type: object
      required: [id, name, artist, album]
      properties:
        id: {type: string}
        name: {type: string}
        artist: {type: string}
        album: {type: string}
    QualityOption:
      type: object
      required: [id, label, available]
      properties:
        id:
          type: string
          enum: [aac, aac-binaural, aac-downmix, alac, ec3, ac3]
        label: {type: string}
        available: {type: boolean}
        codec: {type: string}
        codec_id: {type: string}
        channels: {type: integer}
        bit_depth: {type: integer}
        sample_rate:
          type: integer
          description: Hz.
        bitrate:
          type: integer
          description: bits per second.
        description: {type: string}
    QualityResponse:
      type: object
      required: [input, storefront, type, adam_id, song, qualities]
      properties:
        input: {type: string}
        storefront: {type: string}
        type:
          type: string
          const: song
        adam_id: {type: string}
        song:
          $ref: '#/components/schemas/QualitySong'
        qualities:
          type: array
          items:
            $ref: '#/components/schemas/QualityOption'
    MeResponse:
      type: object
      required: [user_id, username, role, avatar_url]
      properties:
        user_id:
          type: string
          description: 单用户模式下为空字符串。
        username:
          type: string
        role:
          type: string
          enum: [admin, user]
        avatar_url:
          type: string
    User:
      type: object
      required: [id, username, role, avatar_url, enabled, aliases, emails, created_at, updated_at]
      properties:
        id: {type: string}
        username:
          type: string
          description: 须匹配 ^[a-z0-9_-]{1,32}$，同时用作用户下载目录名。
        role:
          type: string
          enum: [admin, user]
        avatar_url: {type: string}
        enabled: {type: boolean}
        aliases:
          type: array
          items: {type: string}
        emails:
          type: array
          items: {type: string}
        config:
          allOf:
            - $ref: '#/components/schemas/DownloadOverrides'
          description: 用户级配置覆盖；未设置时省略。
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    CreateUserRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
          description: 须匹配 ^[a-z0-9_-]{1,32}$。
        role:
          type: string
          enum: [admin, user]
          default: user
        avatar_url: {type: string}
        aliases:
          type: array
          items: {type: string}
        emails:
          type: array
          items: {type: string}
        config:
          allOf:
            - $ref: '#/components/schemas/DownloadOverrides'
          description: 用户级配置覆盖的初始值。
    UpdateUserRequest:
      type: object
      description: 所有字段可选，仅提交的字段生效。
      properties:
        role:
          type: string
          enum: [admin, user]
        enabled: {type: boolean}
        avatar_url: {type: string}
        aliases:
          type: array
          items: {type: string}
        emails:
          type: array
          items: {type: string}
        config:
          allOf:
            - $ref: '#/components/schemas/DownloadOverrides'
          description: 提交时整体替换用户的配置覆盖层；提交 {} 或 null 清空；缺省保持不变。
    Job:
      type: object
      required: [id, input, type, force, status, total_items, done_items, failed_items, created_at, updated_at]
      properties:
        id:
          type: string
        user_id:
          type: string
          description: 任务归属用户 ID；历史或单用户任务为空。
        username:
          type: string
          description: 归属用户名，便于展示。
        input:
          type: string
        type:
          type: string
          enum: [song, album, playlist]
        storefront:
          type: string
        force:
          type: boolean
        config:
          allOf:
            - $ref: '#/components/schemas/DownloadOverrides'
          description: 提交时快照的配置覆盖层（用户级与请求级合并结果）；后续修改用户配置或重启不影响本任务。省略表示完全使用全局配置。
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        total_items:
          type: integer
        done_items:
          type: integer
        failed_items:
          type: integer
        error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    JobItem:
      type: object
      required: [id, job_id, adam_id, kind, index, status, progress, created_at, updated_at]
      properties:
        id: {type: string}
        job_id: {type: string}
        adam_id: {type: string}
        kind: {type: string}
        index: {type: integer}
        title: {type: string}
        artist: {type: string}
        album: {type: string}
        status:
          type: string
          enum: [queued, resolving, downloading, decrypting, remuxing, tagging, saving, completed, failed, skipped_existing, cancelled]
        progress: {type: number, format: double}
        codec: {type: string}
        retry_kind: {type: string}
        attempt: {type: integer}
        max_attempts: {type: integer}
        status_message: {type: string}
        output_path: {type: string}
        error: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    DownloadDetail:
      type: object
      required: [job, items, retry_policy]
      properties:
        job:
          $ref: '#/components/schemas/Job'
        items:
          type: array
          items:
            $ref: '#/components/schemas/JobItem'
        retry_policy:
          $ref: '#/components/schemas/RetryPolicy'
