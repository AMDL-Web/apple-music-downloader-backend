openapi: 3.1.0
info:
  title: AMDL Backend API
  version: 1.0.0
  description: Apple Music 下载任务与 wrapper-manager 管理接口。
servers:
  - url: /
tags:
  - name: System
  - name: Wrapper
  - name: Quality
  - name: Downloads
paths:
  /api/v1/health:
    get:
      tags: [System]
      summary: 后端健康检查
      operationId: getHealth
      responses:
        '200':
          description: 后端可用。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: 本地数据库不可用。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/logs:
    get:
      tags: [System]
      summary: 查询进程日志
      description: >-
        查询 logging.buffer_size 保留的最近结构化日志，按时间正序返回。
        首次查询返回最近的 limit 条；带 after 的后续查询从游标向前分页，
        next_cursor 可直接用于下一页。oldest_sequence 是当前最早保留序号，
        truncated 表示 after 与它之间已有记录被内存环淘汰。敏感属性在进入
        缓冲区和外部输出前已统一脱敏。
      operationId: listLogs
      parameters:
        - $ref: '#/components/parameters/LogLevel'
        - $ref: '#/components/parameters/LogComponent'
        - $ref: '#/components/parameters/LogRequestID'
        - $ref: '#/components/parameters/LogJobID'
        - $ref: '#/components/parameters/LogQuery'
        - $ref: '#/components/parameters/LogSince'
        - $ref: '#/components/parameters/LogUntil'
        - $ref: '#/components/parameters/LogAfter'
        - $ref: '#/components/parameters/LogLimit'
      responses:
        '200':
          description: 匹配的日志和下一次查询游标。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/v1/logs/stream:
    get:
      tags: [System]
      summary: 实时订阅进程日志
      description: >-
        SSE 日志流。先重放内存中游标后的匹配记录，再持续推送新记录；每条
        事件名为 log，SSE id 等于日志 sequence。after 缺省时使用
        Last-Event-ID 请求头；有游标时完整重放仍在内存中的匹配记录，二者都
        缺省时按 limit 重放最近记录。服务端每 15 秒发送 keepalive 注释；
        客户端持续读取过慢时连接会关闭，应携带最后收到的 id 重连补齐。
      operationId: streamLogs
      parameters:
        - $ref: '#/components/parameters/LogLevel'
        - $ref: '#/components/parameters/LogComponent'
        - $ref: '#/components/parameters/LogRequestID'
        - $ref: '#/components/parameters/LogJobID'
        - $ref: '#/components/parameters/LogQuery'
        - $ref: '#/components/parameters/LogSince'
        - $ref: '#/components/parameters/LogUntil'
        - $ref: '#/components/parameters/LogAfter'
        - $ref: '#/components/parameters/LogLimit'
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: string
            pattern: '^[0-9]+$'
      responses:
        '200':
          description: text/event-stream；data 为 LogEntry JSON。
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/config:
    get:
      tags: [System]
      summary: 读取当前运行时配置（仅可修改字段）
      description: >-
        返回当前生效配置中可运行时修改的部分：download 段（max_running_jobs
        除外）、logging.level/access_log、simulate 段、catalog.album_track_url_mode/media_user_token/media_user_token_priority。
        仅启动时生效的字段（server、database、logging 其它字段、wrapper、tools、catalog 其它字段）不返回——
        它们无法通过本 API 修改，请编辑 configs/config.yaml 并重启。

        每次 GET 会先重读 configs/config.yaml 再返回，因此运行期间手工编辑
        的可修改字段在下一次 GET 后即生效、无需重启；文件中仅启动时生效
        字段的改动不会被载入内存（进程内组件无法跟随变化），仍需重启。
        AMDL_<大写段名>_<大写键名> 环境变量覆盖在每次重读时同样生效并
        优先于文件值。文件当前不可读或校验失败时（例如正编辑到一半），
        继续返回上一份有效配置，并附 reload_error 字段说明原因。
      operationId: getConfig
      responses:
        '200':
          description: 当前可运行时修改的配置。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
    put:
      tags: [System]
      summary: 更新运行时配置
      description: >-
        请求体按合并语义覆盖当前运行时配置：省略的字段保持现值，出现的字段
        （含整段）被替换。合并结果必须通过与配置文件相同的完整校验。

        仅 GET 返回的字段可以修改：download 段（max_running_jobs 除外）、
        logging.level/access_log、simulate 段、catalog.album_track_url_mode/media_user_token/media_user_token_priority。其余字段只在进程启动时
        被消费，修改请求会被 422 拒绝——请改 configs/config.yaml 并重启。
        被 AMDL_<大写段名>_<大写键名> 环境变量覆盖的字段同样返回 422：
        写入会在下一次配置重载时被环境变量的值重新遮盖，请改环境变量并
        重启。

        修改立即对新请求和新开始的任务生效（运行中的任务继续使用其启动时的
        配置快照），并写回 configs/config.yaml，重启后依然生效。该文件由
        后端管理（每次 PUT 整体重写，注释不保留）；带完整注释的字段文档在
        configs/config.example.yaml，首次启动时会以它为模板生成 config.yaml。

        前端注意：确认写入前请先 GET 一次并基于其返回值构造请求体。PUT 的
        合并基准是后端内存中的当前配置，而 GET 会先重读配置文件、把运行
        期间的手工文件编辑同步进内存——跳过 GET 直接 PUT，可能基于过期
        视图覆盖掉别处（其它页面或手工编辑）刚改过的值。
      operationId: updateConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeConfig'
      responses:
        '200':
          description: 更新后的运行时配置。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '400':
          description: 请求体不是合法 JSON 或包含未知字段。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: >-
            合并结果未通过配置校验，或试图修改仅启动时生效的字段，
            或试图修改被 AMDL_* 环境变量覆盖的字段。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/developer-token:
    get:
      tags: [System]
      summary: 获取本地签名的 Apple Music developer token
      description: >-
        仅本地签名模式可用：用配置的 .p8 私钥现签一个 JWT，有效期由
        catalog.developer_token_ttl_hours 控制（默认 1 小时）；配置了
        catalog.allowed_origins 时会附加 origin claim。传统抓取模式下返回
        409（抓取的 token 有 origin 限制，无法外发）。
      operationId: getDeveloperToken
      responses:
        '200':
          description: 新签发的 developer token。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperTokenResponse'
        '409':
          description: 当前为传统抓取模式，不支持签发 developer token。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/wrapper/status:
    get:
      tags: [Wrapper]
      summary: 查询 wrapper-manager 状态
      description: 探测 wrapper-manager 连通性与登录/区域等运行状态；下载前或账号管理前使用。
      operationId: getWrapperStatus
      responses:
        '200':
          description: Wrapper 状态。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrapperStatus'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/wrapper/login:
    post:
      tags: [Wrapper]
      summary: 登录 wrapper 账号
      description: 登录可能直接成功，也可能返回 login_id 要求两步验证码。
      operationId: loginWrapper
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedInResponse'
        '202':
          description: 需要提交两步验证码。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeedsTwoStepResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
  /api/v1/wrapper/login/{login_id}/2fa:
    post:
      tags: [Wrapper]
      summary: 提交两步验证码
      operationId: submitWrapperTwoStepCode
      parameters:
        - $ref: '#/components/parameters/LoginID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoStepRequest'
      responses:
        '200':
          description: 登录成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedInResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
  /api/v1/wrapper/logout:
    post:
      tags: [Wrapper]
      summary: 登出 wrapper 账号
      operationId: logoutWrapper
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: 登出成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedOutResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
  /api/v1/quality:
    post:
      tags: [Quality]
      summary: 查询歌曲可用音质
      description: 解析 Apple Music 单曲 URL 或带 i 参数的专辑 URL，返回可用 codec、码率、采样率和位深摘要；不会创建下载任务。
      operationId: queryQuality
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QualityRequest'
      responses:
        '200':
          description: 可用音质摘要。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/downloads:
    get:
      tags: [Downloads]
      summary: 列出下载任务
      description: |
        返回下载任务列表快照，支持分页、状态/类型/区域筛选、标题与输入 URL
        子串搜索，以及按创建/更新时间窗口过滤。默认按 created_at 降序。
        多值参数（status、type）支持重复键或逗号分隔，例如
        `status=failed&status=cancelled` 与 `status=failed,cancelled` 等价。
      operationId: listDownloads
      parameters:
        - name: limit
          in: query
          description: 返回数量，默认 50，最大 200。
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          description: 跳过的任务数，用于分页；默认 0。
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: status
          in: query
          description: >-
            按任务状态筛选；可重复或逗号分隔。允许值：queued, running,
            completed, failed, cancelled。
          schema:
            type: array
            items:
              type: string
              enum: [queued, running, completed, failed, cancelled]
          style: form
          explode: true
        - name: type
          in: query
          description: >-
            按任务类型筛选；可重复或逗号分隔。允许值：song, album, playlist,
            artist, station。
          schema:
            type: array
            items:
              type: string
              enum: [song, album, playlist, artist, station]
          style: form
          explode: true
        - name: storefront
          in: query
          description: 按 Apple Music storefront 精确匹配，例如 us、cn、jp。
          schema:
            type: string
        - name: q
          in: query
          description: >-
            在任务 title 与 input 上做子串搜索（SQLite LIKE；ASCII 字母不区分大小写）。
            `%` 与 `_` 按字面匹配。
          schema:
            type: string
        - name: created_after
          in: query
          description: >-
            仅返回 created_at >= 该时刻的任务。接受 RFC3339（含可选纳秒）或
            YYYY-MM-DD（按 UTC 日初 00:00:00）。
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          description: >-
            仅返回 created_at <= 该时刻的任务。接受 RFC3339（含可选纳秒）或
            YYYY-MM-DD（按 UTC 日末 23:59:59.999999999）。
          schema:
            type: string
            format: date-time
        - name: updated_after
          in: query
          description: >-
            仅返回 updated_at >= 该时刻的任务。接受 RFC3339（含可选纳秒）或
            YYYY-MM-DD（按 UTC 日初 00:00:00）。
          schema:
            type: string
            format: date-time
        - name: updated_before
          in: query
          description: >-
            仅返回 updated_at <= 该时刻的任务。接受 RFC3339（含可选纳秒）或
            YYYY-MM-DD（按 UTC 日末 23:59:59.999999999）。
          schema:
            type: string
            format: date-time
        - name: sort
          in: query
          description: 排序字段；默认 created_at。
          schema:
            type: string
            enum: [created_at, updated_at]
            default: created_at
        - name: order
          in: query
          description: 排序方向；默认 desc。
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: 下载任务列表快照。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadList'
        '400':
          description: 查询参数无效（非法枚举、时间格式、limit/offset 越界等）。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Downloads]
      summary: 批量创建下载任务
      description: >-
        提交一批 URL，逐条返回入队结果；重复、不支持或队列已满的 URL 在
        results 中单独标记，不影响其他 URL 入队。可选的 overrides 字段
        对本次请求创建的所有任务生效，覆盖运行时配置的 download 段。
      operationId: createDownload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadRequest'
      responses:
        '202':
          description: 至少一条 URL 已入队；逐条结果见 results。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchSubmitResponse'
        '400':
          description: >-
            请求体无法解析、包含未知字段（例如 overrides 内的键拼写错误）、
            urls 为空或超过单次上限（100 条）。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: >-
            所有 URL 均被拒绝（响应体为 BatchSubmitResponse，逐条原因见
            results），或 overrides 未通过配置校验（响应体为 ErrorResponse）。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/BatchSubmitResponse'
                  - $ref: '#/components/schemas/ErrorResponse'
  /api/v1/downloads/events:
    get:
      tags: [Downloads]
      summary: 订阅下载列表变化（SSE）
      description: |
        总览事件流：GET /downloads 是列表的一次性快照，本端点则在列表发生变化时
        实时推送增量，二者是同一份状态的两种获取方式。每条推送是一个
        DownloadFeedMessage：
        - download_upserted：某个任务被新建或发生变化（排队、开始、每完成一首歌
          的进度、终态），data.job 为该任务的最新快照（done_items/failed_items
          按实时进度计算）；
        - download_deleted：某个任务被删除，data.job_id 为被删任务 id。
        只有影响列表展示的「里程碑」事件才会触发推送（新建/恢复/开始/解析完成/
        单曲完成或跳过或失败/终态/删除），逐曲下载进度等高频细节不会推送。
        断线续接：先 GET /downloads 取得 last_event_id，再用 Last-Event-ID 头
        续接，只接收此后新增的变化。download_upserted 与 download_deleted 都带
        event_id，客户端每处理完一条消息后将该值作为新的续接游标。
      operationId: streamDownloadsFeed
      parameters:
        - name: Last-Event-ID
          in: header
          description: 已处理到的最新 event_id（取自 GET /downloads 的 last_event_id 或上一条 upsert 的 event_id）。
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE 事件流，每条 data 为一个 DownloadFeedMessage。
          content:
            text/event-stream:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/downloads/events/ws:
    get:
      tags: [Downloads]
      summary: 订阅下载列表变化（WebSocket）
      description: |
        /api/v1/downloads/events 的 WebSocket 版本，语义一致。握手成功后服务端将
        每条 DownloadFeedMessage 作为一条 JSON 文本消息推送。断线重连时通过
        last_event_id 查询参数续接；download_upserted 与 download_deleted 都带
        event_id，客户端每处理完一条消息后将该值作为新的续接游标。
      operationId: streamDownloadsFeedWebSocket
      parameters:
        - name: last_event_id
          in: query
          description: 已处理到的最新 event_id，续接时只推送此后新增的变化。默认 0（从头推送当前所有任务的最新快照）。
          schema:
            type: integer
            format: int64
            default: 0
      responses:
        '101':
          description: 协议切换成功，开始推送列表变化。
        '400':
          description: WebSocket 握手失败（缺少升级头等）。
  /api/v1/downloads/{job_id}:
    get:
      tags: [Downloads]
      summary: 查询下载任务详情
      operationId: getDownload
      parameters:
        - $ref: '#/components/parameters/JobID'
      responses:
        '200':
          description: 任务、任务项与重试策略。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Downloads]
      summary: 删除下载任务
      description: 删除处于终态（completed/failed/cancelled）的任务及其任务项与事件记录。排队中或进行中的任务需先取消。
      operationId: deleteDownload
      parameters:
        - $ref: '#/components/parameters/JobID'
      responses:
        '200':
          description: 任务已删除。
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 任务未处于终态，需先取消。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/downloads/{job_id}/cancel:
    post:
      tags: [Downloads]
      summary: 取消下载任务
      operationId: cancelDownload
      parameters:
        - $ref: '#/components/parameters/JobID'
      responses:
        '200':
          description: 任务已取消。
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: cancelled
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/downloads/{job_id}/retry:
    post:
      tags: [Downloads]
      summary: 重试失败的下载任务
      description: |
        将处于 failed 终态的任务重新入队执行，实际重试只针对未完成的轨道：
        已完成（completed）或已跳过（skipped_existing）的任务项保持原状、不会重新下载；
        其余任务项（failed 等）被重置为 queued 后在原任务项 id 下重新处理。
        重新入队会记录并推送 job_retried 事件（属于总览里程碑事件，会驱动 GET /downloads 总览流）。
      operationId: retryDownload
      parameters:
        - $ref: '#/components/parameters/JobID'
      responses:
        '202':
          description: 任务已重新入队。
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: queued
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            任务不处于 failed 状态；或相同链接已存在排队/进行中的任务；
            或上一次运行仍在收尾（终态刚写入、worker 清理/hook 分发还未完成，
            窗口极短，稍后重试即可）。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: 任务队列已满，稍后重试。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/downloads/{job_id}/events:
    get:
      tags: [Downloads]
      summary: 订阅下载任务事件
      description: |
        Server-Sent Events 流，支持 Last-Event-ID 断点续接。
        任务已处于终态（completed/failed/cancelled）时：若还有未推送给该客户端
        的历史事件（含终态事件本身，以及仍在执行中的下载后 hook 产生的
        hook_started/hook_succeeded/hook_failed 事件——hook 是异步触发的，
        可能在任务终态之后才陆续记录），会先原样回放这些事件；只要 hook 还没
        跑完就保持连接，直到 hook 结束才关闭。只有当客户端已经追上全部事件、
        且没有 hook 仍在执行时才直接拒绝订阅（409）——这种情况下最终状态请改用
        GET .../downloads/{job_id}。
      operationId: streamDownloadEvents
      parameters:
        - $ref: '#/components/parameters/JobID'
        - name: Last-Event-ID
          in: header
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE 事件流。
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 任务已处于终态、没有 hook 仍在执行、且客户端已追上全部历史事件，不再产生新事件，拒绝订阅。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/downloads/{job_id}/events/ws:
    get:
      tags: [Downloads]
      summary: 订阅下载任务事件（WebSocket）
      description: |
        SSE 端点的 WebSocket 版本，面向移动端（如 iOS URLSessionWebSocketTask）。
        握手成功后，服务端将每条事件作为一条 JSON 文本消息推送，内容与 SSE 端点
        data 字段完全一致（Event 对象；payload 字段本身是 JSON 字符串，需二次解析）。
        断线重连时通过 last_event_id 查询参数续接，只接收更新的事件。
        服务端每 10 秒发送一次 WebSocket ping 探测半开连接；连接为服务端单向推送，
        客户端发送的数据帧会导致连接被关闭。
        任务已处于终态（completed/failed/cancelled）时：若还有未推送给该客户端
        的历史事件（含终态事件本身，以及仍在执行中的下载后 hook 产生的
        hook_started/hook_succeeded/hook_failed 事件——hook 是异步触发的，
        可能在任务终态之后才陆续记录），握手仍会成功并回放这些事件；只要 hook
        还没跑完就保持连接，直到 hook 结束才关闭。只有当客户端已经追上全部
        事件、且没有 hook 仍在执行时才拒绝握手（409）——这种情况下最终状态请
        改用 GET .../downloads/{job_id}。
      operationId: streamDownloadEventsWebSocket
      parameters:
        - $ref: '#/components/parameters/JobID'
        - name: last_event_id
          in: query
          description: 已收到的最后一条事件 id，续接时只推送更新的事件。默认 0（从头推送）。
          schema:
            type: integer
            format: int64
            default: 0
      responses:
        '101':
          description: 协议切换成功，开始推送事件流。
        '400':
          description: WebSocket 握手失败（缺少升级头等）。
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 任务已处于终态、没有 hook 仍在执行、且客户端已追上全部历史事件，不再产生新事件，拒绝握手。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    LoginID:
      name: login_id
      in: path
      required: true
      schema:
        type: string
      example: 4f0f2c79acda4c28b69ebf4f702f8a51
    JobID:
      name: job_id
      in: path
      required: true
      schema:
        type: string
      example: job_01JZ0000000000000000000000
    LogLevel:
      name: level
      in: query
      description: 逗号分隔的精确严重级别，可选 debug、info、warn、error。
      schema:
        type: string
      example: warn,error
    LogComponent:
      name: component
      in: query
      description: 精确匹配 component 属性，例如 api、jobs、media、catalog、hooks、main。
      schema: {type: string}
    LogRequestID:
      name: request_id
      in: query
      description: 精确匹配 HTTP 请求关联 ID。
      schema: {type: string}
    LogJobID:
      name: job_id
      in: query
      description: 精确匹配下载任务 ID。
      schema: {type: string}
    LogQuery:
      name: q
      in: query
      description: 在消息与结构化属性中进行不区分大小写的包含匹配。
      schema: {type: string}
    LogSince:
      name: since
      in: query
      description: 包含该时刻，RFC3339 时间戳。
      schema: {type: string, format: date-time}
    LogUntil:
      name: until
      in: query
      description: 包含该时刻，RFC3339 时间戳。
      schema: {type: string, format: date-time}
    LogAfter:
      name: after
      in: query
      description: 只返回 sequence 大于此值的记录。
      schema: {type: integer, format: int64, minimum: 0}
    LogLimit:
      name: limit
      in: query
      description: 最多返回或重放的记录数，默认查询 200、SSE 500。
      schema: {type: integer, minimum: 1, maximum: 1000}
  responses:
    BadRequest:
      description: 请求参数错误。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 登录或验证码错误。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 资源不存在或登录会话已过期。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 账号已经登录或会话正在验证。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: wrapper-manager 返回异常。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: 服务暂时不可用。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    GatewayTimeout:
      description: wrapper 登录超时。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: 服务器内部错误。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
        storefront:
          type: string
        supported_storefronts:
          type: array
          items:
            type: string
    DeveloperTokenResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: ES256 签名的 Apple Music developer token (JWT)。过期时间从 payload 的 exp claim 读取。
    WrapperStatus:
      type: object
      required: [ready, status, regions, client_count, accounts_supported]
      properties:
        ready:
          type: boolean
        status:
          type: boolean
        regions:
          type: array
          items:
            type: string
        client_count:
          type: integer
          format: int32
        accounts_supported:
          type: boolean
          description: Whether wrapper-manager returned the optional accounts field; false means the connected manager version does not support it.
        accounts:
          type: array
          description: Logged-in wrapper account identifiers when supported by wrapper-manager.
          items:
            type: string
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        database_error:
          type: string
    LogEntry:
      type: object
      required: [sequence, time, level, message]
      properties:
        sequence:
          type: integer
          format: int64
          minimum: 1
        time:
          type: string
          format: date-time
        level:
          type: string
          enum: [debug, info, warn, error]
        message:
          type: string
        source:
          type: string
          description: logging.include_source 为 true 时出现，格式为 Go 源文件路径与行号。
        attributes:
          type: object
          additionalProperties: true
    LogListResponse:
      type: object
      required: [logs, next_cursor, oldest_sequence, truncated]
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'
        next_cursor:
          type: integer
          format: int64
          minimum: 0
        oldest_sequence:
          type: integer
          format: int64
          minimum: 0
          description: 当前内存缓冲区中最早的全局序号；缓冲区为空时为 0。
        truncated:
          type: boolean
          description: after 游标之后、oldest_sequence 之前是否已有记录被淘汰。
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          writeOnly: true
          example: example-password
    TwoStepRequest:
      type: object
      required: [two_step_code]
      properties:
        two_step_code:
          type: string
          example: '123456'
    LogoutRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
          example: user@example.com
    LoggedInResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: logged_in
    NeedsTwoStepResponse:
      type: object
      required: [status, login_id]
      properties:
        status:
          type: string
          const: needs_2fa
        login_id:
          type: string
    LoggedOutResponse:
      type: object
      required: [status, username]
      properties:
        status:
          type: string
          const: logged_out
        username:
          type: string
    DownloadRequest:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          description: >-
            Apple Music 链接列表（单曲/专辑/歌单/艺人/电台）。每个元素内允许包含换行或空白分隔的多个
            URL，服务端会自动拆分；拆分后单次最多 100 条。电台（station，形如
            .../station/.../ra.xxxx）仅支持可解析为曲目列表的个性化/精选电台，需随请求提供
            media_user_token（也可使用配置文件中的 catalog.media_user_token）；直播电台（Apple Music 1 等）没有静态曲目列表，无法下载。
          minItems: 1
          items:
            type: string
          example:
            - https://music.apple.com/cn/album/example/123456789?i=987654321
            - https://music.apple.com/cn/album/example/123456789
        force:
          type: boolean
          default: false
          description: 是否强制重新下载已存在的文件。
        overrides:
          $ref: '#/components/schemas/DownloadOverrides'
          description: >-
            可选：仅对本次请求创建的任务生效的下载配置覆盖。省略的字段沿用
            当前运行时配置。覆盖随任务持久化，重试和重启恢复后依然生效，
            不影响其它任务。
        media_user_token:
          type: string
          description: >-
            可选：Apple Music 订阅令牌（media-user-token），仅用于本次请求中需要用户身份的
            解析：电台（station）下载，以及私人歌单（pl.u-xxx）的封面获取（公共目录不含其封
            面，需以用户身份读取库中的副本）。随请求提供的值只保存在内存中、随这批任务的生命周期存在；写入 catalog.media_user_token
            的值会随配置持久化。catalog.media_user_token_priority 控制两者同时存在时优先使用哪一
            个；其余链接会忽略该字段。
    DownloadOverrides:
      type: object
      description: >-
        下载配置的按需覆盖层，字段与运行时配置 download 段一一对应
        （max_running_jobs 除外——工作池大小在启动时确定，无法按任务覆盖）。
        所有字段可选；提交时会以“当前运行时配置 + 覆盖”做完整校验。
      properties:
        quality_priority:
          type: array
          items:
            type: string
            enum: [alac, aac, aac-binaural, aac-downmix, ec3, ac3]
        codec_alternative: {type: boolean}
        max_parallel_tracks: {type: integer}
        max_attempts: {type: integer}
        downloads_dir: {type: string}
        song_path_format: {type: string}
        album_path_format: {type: string}
        artist_path_format: {type: string}
        playlist_path_format: {type: string}
        station_path_format: {type: string}
        temp_dir: {type: string}
        cover_size: {type: string}
        cover_format:
          type: string
          enum: [jpg, jpeg, png]
        embed_cover: {type: boolean}
        save_album_cover: {type: boolean}
        save_artist_cover: {type: boolean}
        save_playlist_cover: {type: boolean}
        embed_lyrics: {type: boolean}
        save_lyrics_file: {type: boolean}
        lyrics_format:
          type: string
          enum: [lrc, ttml]
        lyrics_type:
          type: string
          enum: [lyrics, syllable-lyrics]
        lyrics_extras:
          type: array
          items:
            type: string
            enum: [translation, pronunciation]
        alac_max_sample_rate: {type: integer}
        alac_max_bit_depth: {type: integer}
        check_integrity: {type: boolean}
    RuntimeConfig:
      type: object
      description: >-
        可运行时修改的配置子集（字段含义、枚举值和默认行为见
        configs/config.example.yaml 内注释）。GET 返回此形状；PUT 时可只
        提交需要修改的字段，省略的字段保持现值。
      properties:
        catalog:
          type: object
          properties:
            album_track_url_mode:
              type: string
              enum: [song, album]
            media_user_token:
              type: string
            media_user_token_priority:
              type: string
              enum: [request, config]
        download:
          type: object
          description: max_running_jobs 仅启动时生效，不在此出现、不可修改。
          properties:
            quality_priority:
              type: array
              minItems: 1
              items:
                type: string
                enum: [alac, aac, aac-binaural, aac-downmix, ec3, ac3]
            codec_alternative: {type: boolean}
            max_parallel_tracks: {type: integer}
            max_attempts: {type: integer}
            downloads_dir: {type: string}
            song_path_format: {type: string}
            album_path_format: {type: string}
            artist_path_format: {type: string}
            playlist_path_format: {type: string}
            station_path_format: {type: string}
            temp_dir: {type: string}
            cover_size:
              type: string
              description: >-
                "{width}x{height}"，例如 5000x5000、3000x3000、1400x1400、600x600。
            cover_format:
              type: string
              enum: [jpg, jpeg, png]
            embed_cover: {type: boolean}
            save_album_cover: {type: boolean}
            save_artist_cover: {type: boolean}
            save_playlist_cover: {type: boolean}
            embed_lyrics: {type: boolean}
            save_lyrics_file: {type: boolean}
            lyrics_format:
              type: string
              enum: [lrc, ttml]
            lyrics_type:
              type: string
              enum: [lyrics, syllable-lyrics]
            lyrics_extras:
              type: array
              items:
                type: string
                enum: [translation, pronunciation]
            alac_max_sample_rate:
              type: integer
              description: Hz；常见取值 44100、48000、96000、192000。
            alac_max_bit_depth:
              type: integer
              description: 常见取值 16、24。
            check_integrity: {type: boolean}
        logging:
          type: object
          description: 只有日志级别和 HTTP 访问日志开关可运行时修改；输出与轮转配置需重启。
          properties:
            level:
              type: string
              enum: [debug, info, warn, error]
            access_log: {type: boolean}
        simulate:
          type: object
          properties:
            enabled: {type: boolean}
            min_speed_kbps: {type: integer}
            max_speed_kbps: {type: integer}
    ConfigResponse:
      type: object
      required: [config, persisted]
      properties:
        config:
          $ref: '#/components/schemas/RuntimeConfig'
        persisted:
          type: boolean
          description: >-
            配置存储是否有后备文件。正常部署下恒为 true：PUT 的修改写回
            configs/config.yaml，重启后依然生效。
        reload_error:
          type: string
          description: >-
            仅 GET 且重读配置文件失败时出现：说明文件为何不可用（不可读或
            校验失败），此时 config 为最后一份有效配置。
    SubmitResult:
      type: object
      required: [url, status]
      properties:
        url:
          type: string
          description: 拆分归一化后的单条输入 URL。
        status:
          type: string
          enum: [accepted, invalid, duplicate_in_request, duplicate_active, queue_full]
        job:
          $ref: '#/components/schemas/Job'
          description: status 为 accepted 时返回新建的任务。
        existing_job_id:
          type: string
          description: status 为 duplicate_active 时指向已在进行中的同内容任务。
        error:
          type: string
          description: 被拒绝时的原因说明。
    BatchSubmitResponse:
      type: object
      required: [accepted, rejected, results]
      properties:
        accepted:
          type: integer
          description: 成功入队的 URL 数。
        rejected:
          type: integer
          description: 被拒绝的 URL 数。
        results:
          type: array
          description: 与请求内 URL 一一对应的逐条结果。
          items:
            $ref: '#/components/schemas/SubmitResult'
    QualityRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          example: https://music.apple.com/cn/album/one-last-kiss/1542953969?i=1542953977
    QualitySong:
      type: object
      required: [id, name, artist, album, has_lyrics]
      properties:
        id: {type: string}
        name: {type: string}
        artist: {type: string}
        album: {type: string}
        has_lyrics:
          type: boolean
          description: >-
            Whether the Apple Music catalog reports lyrics for this track
            (regular or time-synced). Catalog metadata only — it does not
            guarantee the lyrics can actually be fetched at download time.
    QualityOption:
      type: object
      required: [id, label, available]
      properties:
        id:
          type: string
          enum: [aac, aac-binaural, aac-downmix, alac, ec3, ac3]
        label: {type: string}
        available: {type: boolean}
        codec: {type: string}
        codec_id: {type: string}
        channels: {type: integer}
        bit_depth: {type: integer}
        sample_rate:
          type: integer
          description: Hz.
        bitrate:
          type: integer
          description: bits per second.
        description: {type: string}
    QualityResponse:
      type: object
      required: [input, storefront, type, adam_id, song, qualities]
      properties:
        input: {type: string}
        storefront: {type: string}
        type:
          type: string
          const: song
        adam_id: {type: string}
        song:
          $ref: '#/components/schemas/QualitySong'
        qualities:
          type: array
          items:
            $ref: '#/components/schemas/QualityOption'
    Job:
      type: object
      required: [id, input, type, force, status, total_items, done_items, failed_items, created_at, updated_at]
      properties:
        id:
          type: string
        input:
          type: string
        type:
          type: string
          enum: [song, album, playlist, artist, station]
        storefront:
          type: string
        title:
          type: string
          description: >-
            Display name resolved from Apple Music metadata (track/album/
            playlist/artist name). Populated once the job's input is
            resolved; absent before that or for jobs created before this
            field existed — clients should fall back to deriving a name
            from `input` in that case.
        artwork_url:
          type: string
          description: >-
            Cover artwork URL template with {w}x{h} (and optionally {f})
            placeholders; substitute the desired pixel size client-side,
            e.g. 600x600. Populated once the job's input is resolved;
            absent for jobs created before this field existed.
        force:
          type: boolean
        overrides:
          $ref: '#/components/schemas/DownloadOverrides'
          description: 提交时附带的下载配置覆盖；未附带时省略。
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        total_items:
          type: integer
        done_items:
          type: integer
        failed_items:
          type: integer
        error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    JobItem:
      type: object
      required: [id, job_id, adam_id, kind, index, has_lyrics, status, progress, created_at, updated_at]
      properties:
        id: {type: string}
        job_id: {type: string}
        adam_id: {type: string}
        kind: {type: string}
        index: {type: integer}
        title: {type: string}
        artist: {type: string}
        album: {type: string}
        artwork_url:
          type: string
          description: >-
            Track cover artwork URL template with {w}x{h} (and optionally {f})
            placeholders; substitute the desired pixel size client-side,
            e.g. 600x600. Absent for items created before this field existed.
        has_lyrics:
          type: boolean
          description: >-
            Whether the Apple Music catalog reports lyrics for this track
            (regular or time-synced). Set when the collection resolves and
            refreshed when the track's own metadata is fetched. Catalog
            metadata only — it does not guarantee the lyrics can actually
            be fetched at download time. Defaults to false for items
            created before this field existed, until the item is next
            re-processed (e.g. by a retry).
        lyrics_status:
          type: string
          enum: [fetched, failed, none, disabled]
          description: >-
            Durable outcome of this download attempt's lyrics fetch,
            complementing has_lyrics (the catalog's claim) with what
            actually happened. `fetched`: lyrics were fetched and
            converted successfully (the download that follows embeds
            and/or saves them per the config — the flag reflects the
            fetch outcome only; whether the file was produced is the
            item's own status); `failed`: the catalog reported lyrics but
            fetching or converting them failed and the download continued
            without lyrics; `none`: the catalog reports no lyrics for
            this track; `disabled`: lyrics exist but neither embed_lyrics
            nor save_lyrics_file is enabled. Absent while undetermined
            (item not yet processed, or created before this field
            existed) and cleared when a retry re-processes the item.
            For finished (completed/skipped) items the value keeps
            describing the download that produced the file on disk,
            while has_lyrics may be refreshed by a later re-resolve —
            e.g. has_lyrics=true with lyrics_status=none means the file
            predates lyrics becoming available in the catalog.
        status:
          type: string
          enum: [queued, resolving, downloading, decrypting, remuxing, tagging, saving, completed, failed, skipped_existing, cancelled]
        progress: {type: number, format: double}
        codec: {type: string}
        bit_depth:
          type: integer
          description: >-
            Bit depth of the codec currently being attempted (e.g. 24 for
            ALAC lossless). 0/absent for lossy codecs (e.g. AAC/AAC-LC) and
            before the codec's quality has been resolved.
        sample_rate:
          type: integer
          description: >-
            Sample rate in Hz of the codec currently being attempted (e.g.
            96000). 0/absent for aac-lc (no per-track manifest to read it
            from) and before the codec's quality has been resolved.
        bitrate:
          type: integer
          description: >-
            Bitrate in bits per second of the codec currently being
            attempted; for lossless codecs this is the HLS variant's
            advertised average bandwidth, not a true constant bitrate.
            0/absent for aac-lc (no per-track manifest to read it from) and
            before the codec's quality has been resolved.
        retry_kind: {type: string}
        attempt: {type: integer}
        max_attempts: {type: integer}
        status_message: {type: string}
        error: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    DownloadList:
      type: object
      required: [downloads, total, limit, offset, last_event_id]
      properties:
        downloads:
          type: array
          description: >-
            当前页的下载任务；每个任务的 done_items/failed_items 按其 job_items
            的实时进度计算（而非仅在终态刷新的存储计数）。
          items:
            $ref: '#/components/schemas/Job'
        total:
          type: integer
          description: 满足当前筛选条件的任务总数（不受 limit/offset 影响）。
        limit:
          type: integer
          description: 本次实际使用的分页大小。
        offset:
          type: integer
          description: 本次实际使用的偏移量。
        last_event_id:
          type: integer
          format: int64
          description: >-
            当前全局已持久化的最新事件 id（跨所有任务，尚无事件时为 0）。客户端可
            将此值作为总览事件流 GET /downloads/events(/ws) 的续接起点，只接收本
            快照之后的列表变化。
    DownloadFeedMessage:
      type: object
      required: [type]
      description: 总览事件流（GET /downloads/events(/ws)）的一条推送。
      properties:
        type:
          type: string
          enum: [download_upserted, download_deleted]
          description: >-
            download_upserted：某任务被新建或发生变化，job 为其最新快照；
            download_deleted：某任务被删除，job_id 为被删任务 id。
        job:
          $ref: '#/components/schemas/Job'
        job_id:
          type: string
          description: 仅 download_deleted 时存在，为被删除任务的 id。
        event_id:
          type: integer
          format: int64
          description: >-
            续接游标；download_upserted 为触发该任务快照的里程碑事件自身 id，
            download_deleted 为删除 tombstone 事件 id（都不是同批推送的最大 id）。
            客户端处理后作为下次续接起点，逐条严格递增。断线重连时未送达的更新
            只会被重发（upsert/delete 均幂等），不会被跳过。
    DownloadDetail:
      type: object
      required: [job, items, hooks, last_event_id]
      properties:
        job:
          $ref: '#/components/schemas/Job'
        items:
          type: array
          items:
            $ref: '#/components/schemas/JobItem'
        hooks:
          type: array
          description: >-
            每个已触发的下载后 hook 的最新状态，由事件流中的
            hook_started/hook_succeeded/hook_failed 事件推导而来——快照接口与
            SSE/WS 事件流是同一份状态的两种获取方式。任务尚未触发任何 hook
            （包括未配置 hook、任务还没结束）时为空数组。
          items:
            $ref: '#/components/schemas/HookState'
        last_event_id:
          type: integer
          format: int64
          description: >-
            该任务当前已持久化的最新事件 id（尚无事件时为 0）。客户端可将此值作为
            events/ws（或 SSE 的 Last-Event-ID）的续接起点，从而跳过本响应已经
            体现过的历史事件，只接收此后的增量更新。
    HookState:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
          description: hooks.yaml 中该 hook 条目的 name。
        status:
          type: string
          enum: [running, succeeded, failed, interrupted]
          description: >-
            running：hook 正在执行；succeeded：执行成功；failed：重试次数用尽后
            仍失败；interrupted：事件记录显示 hook 已开始但没有终态记录、且当前
            也没有在执行（通常是执行期间服务重启，该 hook 不会再有结果）。
        error:
          type: string
          description: status 为 failed 时的最后一次错误信息，其余状态省略。
