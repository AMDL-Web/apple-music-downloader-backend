openapi: 3.1.0
info:
  title: AMDL Backend API
  version: 1.0.0
  description: Apple Music 下载任务与 wrapper-manager 管理接口。
servers:
  - url: /
tags:
  - name: System
  - name: Wrapper
  - name: Quality
  - name: Downloads
paths:
  /api/v1/health:
    get:
      tags: [System]
      summary: 后端健康检查
      operationId: getHealth
      responses:
        '200':
          description: 后端可用。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: 本地数据库不可用。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/capabilities:
    get:
      tags: [System]
      summary: 查询下载能力和外部工具
      operationId: getCapabilities
      responses:
        '200':
          description: 当前配置与工具可用性。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilitiesResponse'
  /api/v1/developer-token:
    get:
      tags: [System]
      summary: 获取本地签名的 Apple Music developer token
      description: >-
        仅本地签名模式可用：用配置的 .p8 私钥现签一个 JWT，有效期由
        catalog.developer_token_ttl_hours 控制（默认 1 小时）；配置了
        catalog.allowed_origins 时会附加 origin claim。传统抓取模式下返回
        409（抓取的 token 有 origin 限制，无法外发）。
      operationId: getDeveloperToken
      responses:
        '200':
          description: 新签发的 developer token。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperTokenResponse'
        '409':
          description: 当前为传统抓取模式，不支持签发 developer token。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/wrapper/status:
    get:
      tags: [Wrapper]
      summary: 查询 wrapper-manager 状态
      description: 探测 wrapper-manager 连通性与登录/区域等运行状态；下载前或账号管理前使用。
      operationId: getWrapperStatus
      responses:
        '200':
          description: Wrapper 状态。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrapperStatus'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/wrapper/login:
    post:
      tags: [Wrapper]
      summary: 登录 wrapper 账号
      description: 登录可能直接成功，也可能返回 login_id 要求两步验证码。
      operationId: loginWrapper
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedInResponse'
        '202':
          description: 需要提交两步验证码。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NeedsTwoStepResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
  /api/v1/wrapper/login/{login_id}/2fa:
    post:
      tags: [Wrapper]
      summary: 提交两步验证码
      operationId: submitWrapperTwoStepCode
      parameters:
        - $ref: '#/components/parameters/LoginID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoStepRequest'
      responses:
        '200':
          description: 登录成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedInResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
  /api/v1/wrapper/logout:
    post:
      tags: [Wrapper]
      summary: 登出 wrapper 账号
      operationId: logoutWrapper
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: 登出成功。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggedOutResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
  /api/v1/quality:
    post:
      tags: [Quality]
      summary: 查询歌曲可用音质
      description: 解析 Apple Music 单曲 URL 或带 i 参数的专辑 URL，返回可用 codec、码率、采样率和位深摘要；不会创建下载任务。
      operationId: queryQuality
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QualityRequest'
      responses:
        '200':
          description: 可用音质摘要。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          $ref: '#/components/responses/BadGateway'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/downloads:
    get:
      tags: [Downloads]
      summary: 列出下载任务
      operationId: listDownloads
      parameters:
        - name: limit
          in: query
          description: 返回数量，默认 50，最大 200。
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: 下载任务列表。
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Downloads]
      summary: 批量创建下载任务
      description: 提交一批 URL，逐条返回入队结果；重复、不支持或队列已满的 URL 在 results 中单独标记，不影响其他 URL 入队。
      operationId: createDownload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadRequest'
      responses:
        '202':
          description: 至少一条 URL 已入队；逐条结果见 results。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchSubmitResponse'
        '400':
          description: 请求体无法解析、urls 为空或超过单次上限（100 条）。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 所有 URL 均被拒绝；逐条原因见 results。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchSubmitResponse'
  /api/v1/downloads/{job_id}:
    get:
      tags: [Downloads]
      summary: 查询下载任务详情
      operationId: getDownload
      parameters:
        - $ref: '#/components/parameters/JobID'
      responses:
        '200':
          description: 任务、任务项与重试策略。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Downloads]
      summary: 删除下载任务
      description: 删除处于终态（completed/failed/cancelled）的任务及其任务项与事件记录。排队中或进行中的任务需先取消。
      operationId: deleteDownload
      parameters:
        - $ref: '#/components/parameters/JobID'
      responses:
        '200':
          description: 任务已删除。
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 任务未处于终态，需先取消。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/downloads/{job_id}/cancel:
    post:
      tags: [Downloads]
      summary: 取消下载任务
      operationId: cancelDownload
      parameters:
        - $ref: '#/components/parameters/JobID'
      responses:
        '200':
          description: 任务已取消。
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: cancelled
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/downloads/{job_id}/events:
    get:
      tags: [Downloads]
      summary: 订阅下载任务事件
      description: Server-Sent Events 流，支持 Last-Event-ID 断点续接。
      operationId: streamDownloadEvents
      parameters:
        - $ref: '#/components/parameters/JobID'
        - name: Last-Event-ID
          in: header
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: SSE 事件流。
          content:
            text/event-stream:
              schema:
                type: string
  /api/v1/downloads/{job_id}/events/ws:
    get:
      tags: [Downloads]
      summary: 订阅下载任务事件（WebSocket）
      description: |
        SSE 端点的 WebSocket 版本，面向移动端（如 iOS URLSessionWebSocketTask）。
        握手成功后，服务端将每条事件作为一条 JSON 文本消息推送，内容与 SSE 端点
        data 字段完全一致（Event 对象；payload 字段本身是 JSON 字符串，需二次解析）。
        断线重连时通过 last_event_id 查询参数续接，只接收更新的事件。
        服务端每 10 秒发送一次 WebSocket ping 探测半开连接；连接为服务端单向推送，
        客户端发送的数据帧会导致连接被关闭。
      operationId: streamDownloadEventsWebSocket
      parameters:
        - $ref: '#/components/parameters/JobID'
        - name: last_event_id
          in: query
          description: 已收到的最后一条事件 id，续接时只推送更新的事件。默认 0（从头推送）。
          schema:
            type: integer
            format: int64
            default: 0
      responses:
        '101':
          description: 协议切换成功，开始推送事件流。
        '400':
          description: WebSocket 握手失败（缺少升级头等）。
components:
  parameters:
    LoginID:
      name: login_id
      in: path
      required: true
      schema:
        type: string
      example: 4f0f2c79acda4c28b69ebf4f702f8a51
    JobID:
      name: job_id
      in: path
      required: true
      schema:
        type: string
      example: job_01JZ0000000000000000000000
  responses:
    BadRequest:
      description: 请求参数错误。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 登录或验证码错误。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 资源不存在或登录会话已过期。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 账号已经登录或会话正在验证。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: wrapper-manager 返回异常。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: 服务暂时不可用。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    GatewayTimeout:
      description: wrapper 登录超时。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: 服务器内部错误。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
        storefront:
          type: string
        supported_storefronts:
          type: array
          items:
            type: string
    DeveloperTokenResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: ES256 签名的 Apple Music developer token (JWT)。过期时间从 payload 的 exp claim 读取。
    WrapperStatus:
      type: object
      required: [ready, status, regions, client_count, accounts_supported]
      properties:
        ready:
          type: boolean
        status:
          type: boolean
        regions:
          type: array
          items:
            type: string
        client_count:
          type: integer
          format: int32
        accounts_supported:
          type: boolean
          description: Whether wrapper-manager returned the optional accounts field; false means the connected manager version does not support it.
        accounts:
          type: array
          description: Logged-in wrapper account identifiers when supported by wrapper-manager.
          items:
            type: string
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        database_error:
          type: string
    ToolCapability:
      type: object
      required: [name, available]
      properties:
        name:
          type: string
        available:
          type: boolean
        path:
          type: string
        error:
          type: string
    CapabilitiesResponse:
      type: object
      required: [api, supported_inputs, unsupported_inputs, quality_priority, codec_alternative, fallback_codec, album_track_url_mode, tools]
      properties:
        api:
          type: string
        supported_inputs:
          type: array
          items:
            type: string
          example: [song_url, album_url, playlist_url, artist_url]
        unsupported_inputs:
          type: array
          items:
            type: string
          example: [music_video, station, search]
        quality_priority:
          type: array
          items:
            type: string
        codec_alternative:
          type: boolean
        fallback_codec:
          type: string
        album_track_url_mode:
          type: string
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolCapability'
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          writeOnly: true
          example: example-password
    TwoStepRequest:
      type: object
      required: [two_step_code]
      properties:
        two_step_code:
          type: string
          example: '123456'
    LogoutRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
          example: user@example.com
    LoggedInResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: logged_in
    NeedsTwoStepResponse:
      type: object
      required: [status, login_id]
      properties:
        status:
          type: string
          const: needs_2fa
        login_id:
          type: string
    LoggedOutResponse:
      type: object
      required: [status, username]
      properties:
        status:
          type: string
          const: logged_out
        username:
          type: string
    DownloadRequest:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          description: Apple Music 链接列表（单曲/专辑/歌单/艺人）。每个元素内允许包含换行或空白分隔的多个 URL，服务端会自动拆分；拆分后单次最多 100 条。
          minItems: 1
          items:
            type: string
          example:
            - https://music.apple.com/cn/album/example/123456789?i=987654321
            - https://music.apple.com/cn/album/example/123456789
        force:
          type: boolean
          default: false
          description: 是否强制重新下载已存在的文件。
    SubmitResult:
      type: object
      required: [url, status]
      properties:
        url:
          type: string
          description: 拆分归一化后的单条输入 URL。
        status:
          type: string
          enum: [accepted, invalid, duplicate_in_request, duplicate_active, queue_full]
        job:
          $ref: '#/components/schemas/Job'
          description: status 为 accepted 时返回新建的任务。
        existing_job_id:
          type: string
          description: status 为 duplicate_active 时指向已在进行中的同内容任务。
        error:
          type: string
          description: 被拒绝时的原因说明。
    BatchSubmitResponse:
      type: object
      required: [accepted, rejected, results]
      properties:
        accepted:
          type: integer
          description: 成功入队的 URL 数。
        rejected:
          type: integer
          description: 被拒绝的 URL 数。
        results:
          type: array
          description: 与请求内 URL 一一对应的逐条结果。
          items:
            $ref: '#/components/schemas/SubmitResult'
    QualityRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          example: https://music.apple.com/cn/album/one-last-kiss/1542953969?i=1542953977
    QualitySong:
      type: object
      required: [id, name, artist, album]
      properties:
        id: {type: string}
        name: {type: string}
        artist: {type: string}
        album: {type: string}
    QualityOption:
      type: object
      required: [id, label, available]
      properties:
        id:
          type: string
          enum: [aac, aac-binaural, aac-downmix, alac, ec3, ac3]
        label: {type: string}
        available: {type: boolean}
        codec: {type: string}
        codec_id: {type: string}
        channels: {type: integer}
        bit_depth: {type: integer}
        sample_rate:
          type: integer
          description: Hz.
        bitrate:
          type: integer
          description: bits per second.
        description: {type: string}
    QualityResponse:
      type: object
      required: [input, storefront, type, adam_id, song, qualities]
      properties:
        input: {type: string}
        storefront: {type: string}
        type:
          type: string
          const: song
        adam_id: {type: string}
        song:
          $ref: '#/components/schemas/QualitySong'
        qualities:
          type: array
          items:
            $ref: '#/components/schemas/QualityOption'
    Job:
      type: object
      required: [id, input, type, force, status, total_items, done_items, failed_items, created_at, updated_at]
      properties:
        id:
          type: string
        input:
          type: string
        type:
          type: string
          enum: [song, album, playlist, artist]
        storefront:
          type: string
        title:
          type: string
          description: >-
            Display name resolved from Apple Music metadata (track/album/
            playlist/artist name). Populated once the job's input is
            resolved; absent before that or for jobs created before this
            field existed — clients should fall back to deriving a name
            from `input` in that case.
        artwork_url:
          type: string
          description: >-
            Cover artwork URL template with {w}x{h} (and optionally {f})
            placeholders; substitute the desired pixel size client-side,
            e.g. 600x600. Populated once the job's input is resolved;
            absent for jobs created before this field existed.
        force:
          type: boolean
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        total_items:
          type: integer
        done_items:
          type: integer
        failed_items:
          type: integer
        error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    JobItem:
      type: object
      required: [id, job_id, adam_id, kind, index, status, progress, created_at, updated_at]
      properties:
        id: {type: string}
        job_id: {type: string}
        adam_id: {type: string}
        kind: {type: string}
        index: {type: integer}
        title: {type: string}
        artist: {type: string}
        album: {type: string}
        artwork_url:
          type: string
          description: >-
            Track cover artwork URL template with {w}x{h} (and optionally {f})
            placeholders; substitute the desired pixel size client-side,
            e.g. 600x600. Absent for items created before this field existed.
        status:
          type: string
          enum: [queued, resolving, downloading, decrypting, remuxing, tagging, saving, completed, failed, skipped_existing, cancelled]
        progress: {type: number, format: double}
        codec: {type: string}
        retry_kind: {type: string}
        attempt: {type: integer}
        max_attempts: {type: integer}
        status_message: {type: string}
        error: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    DownloadDetail:
      type: object
      required: [job, items, last_event_id]
      properties:
        job:
          $ref: '#/components/schemas/Job'
        items:
          type: array
          items:
            $ref: '#/components/schemas/JobItem'
        last_event_id:
          type: integer
          format: int64
          description: >-
            该任务当前已持久化的最新事件 id（尚无事件时为 0）。客户端可将此值作为
            events/ws（或 SSE 的 Last-Event-ID）的续接起点，从而跳过本响应已经
            体现过的历史事件，只接收此后的增量更新。
