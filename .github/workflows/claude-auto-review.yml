name: Claude Auto Review

# 自动 PR 审查开关：仓库变量 CLAUDE_AUTO_REVIEW
# - 未设置或设为其他值：开启（默认开）
# - 设为 "false"：关闭
# 修改方式：Settings → Secrets and variables → Actions → Variables，
# 或命令行：gh variable set CLAUDE_AUTO_REVIEW --body false

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  auto-review:
    if: vars.CLAUDE_AUTO_REVIEW != 'false' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # track_progress 会创建一条追踪评论，展示审查进度与最终结论，
          # 并在重复运行时复用同一条评论（取代旧的 use_sticky_comment）。
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            请审查这个 pull request，重点关注：
            - 正确性问题和潜在 bug（并发、错误处理、边界条件）
            - 与仓库现有架构和模式的一致性（参考 CLAUDE.md）
            - 配置项改动是否同步更新了 configs/config.yaml 的注释
            - API 改动是否同步更新了 internal/api/openapi.yaml
            - 测试覆盖是否充分
            - 提交的代码与配置文件中是否包含如本地开发测试ip、本地绝对路径等不适合在开源仓库中提交的内容
            - 是否有破坏性改动（如修改了传参名、端口地址，如果有则等待人工审核）
            - 最终返回的PR Comment 必须使用中文输出！！
            
            审查结论会自动显示在 track_progress 生成的追踪评论中，
            不要再用 `gh pr comment` 单独发一条顶层评论（会造成重复）。
            如需对具体代码行给出行内评论，
            用 `mcp__github_inline_comment__create_inline_comment`（并带上 `confirmed: true`）。
            只报告值得处理的问题，不要泛泛的赞美或吹毛求疵；没有问题就简短说明审查通过。

          # 授权行内评论工具，以及只读的 diff/view 用于收集上下文。
          # 不授权 gh pr comment：结论由 track_progress 的追踪评论承载，
          # 额外的 gh pr comment 会产生重复评论。
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*)"
