name: Claude Auto Review

# 自动 PR 审查开关：仓库变量 CLAUDE_AUTO_REVIEW
# - 未设置或设为其他值：开启（默认开）
# - 设为 "false"：关闭
# 修改方式：Settings → Secrets and variables → Actions → Variables，
# 或命令行：gh variable set CLAUDE_AUTO_REVIEW --body false

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  auto-review:
    if: vars.CLAUDE_AUTO_REVIEW != 'false' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # track_progress 会创建一条追踪评论，展示审查进度与最终结论，
          # 并在重复运行时复用同一条评论（取代旧的 use_sticky_comment）。
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            请审查这个 pull request，重点关注：
            - 正确性问题和潜在 bug（并发、错误处理、边界条件）
            - 与仓库现有架构和模式的一致性（参考 CLAUDE.md）
            - 配置项改动是否同步更新了 configs/config.yaml 的注释
            - API 改动是否同步更新了 internal/api/openapi.yaml
            - 测试覆盖是否充分

            用 `gh pr comment` 发布顶层审查结论；
            用 `mcp__github_inline_comment__create_inline_comment`（并带上 `confirmed: true`）
            对具体代码行给出行内评论。
            只报告值得处理的问题，不要泛泛的赞美或吹毛求疵；没有问题就简短说明审查通过。
            只通过 GitHub 评论输出审查内容，不要仅把审查文本作为运行消息/日志输出。

          # 必须显式授权这些工具，否则 Claude 无法发布评论，
          # 会导致检查通过（绿勾）但看不到任何评论。
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
