name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish, for example v1.2.3.
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Resolve release tag
        id: release_tag
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$DISPATCH_TAG" ]; then
            tag="$DISPATCH_TAG"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Release tag '$tag' does not exist." >&2
            exit 1
          fi

          {
            echo "tag=$tag"
            echo "title=${tag#v}"
          } >> "$GITHUB_OUTPUT"

      - name: Create release changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release_tag.outputs.tag }}" \
            --verify-tag \
            --title "${{ steps.release_tag.outputs.title }}" \
            --generate-notes
