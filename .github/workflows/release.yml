name: Release

# 发版入口(二选一):
#   - workflow_dispatch:手动指定版本号发版,兜底路径(比如 PR 标题里
#     没写版本号导致自动发版失败时)。
#   - pull_request closed:dev -> main 的 PR 被合并时自动发版,版本号从
#     PR 标题解析(需要形如 "Release v1.2.0: ..." 的 vX.Y.Z 版本号)。
#     标题里没有版本号时该运行会失败并提示改用手动触发,不会静默跳过。
# 两条路径都会:跑测试 -> 读取仓库版本说明或生成 changelog -> 创建 tag +
# GitHub Release -> 显式级联 docker-publish 构建并推送镜像(latest 一并更新)。
on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: true
        type: string
      base_tag:
        description: '基础标签 (可选，默认为上一个标签)'
        required: false
        type: string
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    # 手动触发总是运行;PR 事件只在「来自 dev 且真的被合并」时运行,
    # 直接 close 不合并、或从其他分支合入 main 的 PR 都不发版。
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'dev')
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Resolve version
        id: version
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # 从 PR 标题解析第一个 vX.Y.Z(允许 -rc.1 之类的后缀)
            VERSION=$(printf '%s' "$PR_TITLE" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?' | head -n1 || true)
            if [ -z "$VERSION" ]; then
              echo "::error::PR 标题「$PR_TITLE」中未找到 vX.Y.Z 版本号,无法自动发版。请手动运行 Release workflow 指定版本号。"
              exit 1
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "发布版本: $VERSION"

      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # PR 合并触发时检出合并进 main 的那个提交;手动触发时用所选 ref。
          ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}

      - name: Fail if tag already exists
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::标签 ${{ steps.version.outputs.version }} 已存在,取消发布。如需补发镜像请手动运行 Docker Publish workflow。"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: go test ./...

      - name: Get base tag
        id: get-base-tag
        run: |
          # 如果手动指定了基础标签，使用手动指定的
          if [ -n "${{ github.event.inputs.base_tag }}" ]; then
            BASE_TAG="${{ github.event.inputs.base_tag }}"
          else
            # 获取最新的任何类型标签（通用方式）
            # 优先使用最新的正式 release（通过 GitHub API），如果失败则使用最新标签
            BASE_TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
              | jq -r '.tag_name' 2>/dev/null)

            # 如果还是没有标签，设置为空字符串
            if [ "$BASE_TAG" = "null" ]; then
              BASE_TAG=""
            fi
          fi

          echo "base_tag=$BASE_TAG" >> $GITHUB_OUTPUT
          echo "使用基础标签: ${BASE_TAG:-无}"

          # 检查是否有提交
          if [ -n "$BASE_TAG" ]; then
            COMMIT_COUNT=$(git rev-list --count $BASE_TAG..HEAD)
          else
            # 如果没有标签，检查所有提交
            COMMIT_COUNT=$(git rev-list --count HEAD)
          fi

          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "新提交数量: $COMMIT_COUNT"

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "没有新的提交，取消发布"
            echo "skip_release=true" >> $GITHUB_OUTPUT
          else
            echo "skip_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve release notes
        id: changelog
        if: steps.get-base-tag.outputs.skip_release == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BASE_TAG: ${{ steps.get-base-tag.outputs.base_tag }}
        run: |
          RELEASE_NOTES_FILE=".github/release-notes/${VERSION}.md"

          if [ -s "$RELEASE_NOTES_FILE" ]; then
            echo "使用仓库版本说明: $RELEASE_NOTES_FILE"
            CHANGELOG_CONTENT=$(cat "$RELEASE_NOTES_FILE")
          else
            echo "未找到非空的仓库版本说明 $RELEASE_NOTES_FILE，自动生成 changelog"

            ARGS=(--tag "$VERSION" --with-hash)
            if [ -n "$BASE_TAG" ]; then
              ARGS+=(--base "$BASE_TAG")
            fi

            CHANGELOG_CONTENT=$(node tools/generate-changelog.js "${ARGS[@]}" --output-only)
          fi

          # 使用随机分隔符，避免版本说明中恰好出现 EOF 时截断输出。
          DELIMITER="release_notes_${RANDOM}_${RANDOM}_$$"
          while grep -Fxq "$DELIMITER" <<< "$CHANGELOG_CONTENT"; do
            DELIMITER="release_notes_${RANDOM}_${RANDOM}_$$"
          done
          {
            echo "changelog_content<<$DELIMITER"
            printf '%s\n' "$CHANGELOG_CONTENT"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

          # 显示输出用于调试
          printf '%s\n' "$CHANGELOG_CONTENT"

      - name: Cancel release if no commits
        if: steps.get-base-tag.outputs.skip_release == 'true'
        run: |
          echo "没有新的提交，取消发布"
          exit 1

      - name: Create Release
        if: steps.get-base-tag.outputs.skip_release == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog_content }}
          draft: false
          prerelease: false
          # PR 合并触发时把 tag 打在合并提交上(默认会打在触发事件的
          # GITHUB_SHA 上,对 closed 事件那不是合并提交)。
          target_commitish: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 发版成功后构建并推送 Docker 镜像到 GHCR。必须在这里显式调用:
  # 上面的 release 用 GITHUB_TOKEN 创建 tag,不会级联触发 docker-publish
  # 的 release/push 触发器。没有新提交时 release job 以失败结束,本 job
  # 随之跳过。
  docker:
    name: Publish Docker image
    needs: release
    uses: ./.github/workflows/docker-publish.yml
    permissions:
      contents: read
      packages: write
    with:
      tag: ${{ needs.release.outputs.version }}
      latest: true
