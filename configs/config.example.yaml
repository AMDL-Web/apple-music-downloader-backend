# Configuration example. The live config.yaml contains both startup-bound
# and runtime-mutable keys. PUT /api/v1/config changes only runtime-mutable
# keys while the backend runs and rewrites the live file (comments are
# dropped there — this example is the documented reference). Manual edits to
# runtime-mutable keys take effect on the next GET /api/v1/config; a PUT
# issued before that overwrites them. Manual edits to startup-bound keys take
# effect after a restart.
#
# Every key can be overridden with an environment variable named
# AMDL_<SECTION>_<KEY> (the yaml path uppercased, "_" as
# separator), for example AMDL_SERVER_LISTEN, AMDL_WRAPPER_ADDRESS,
# AMDL_DATABASE_PATH, AMDL_DOWNLOAD_QUALITY_PRIORITY. Overrides sit on top of
# the config file on every start and are not written back merely by loading.
# A PUT writes the effective runtime snapshot, so an unchanged runtime field
# pinned by an environment variable may be persisted during an unrelated PUT;
# startup-field environment overrides are never persisted. Value syntax:
# strings verbatim, booleans true/false, integers as digits, string lists as
# comma-separated items (an empty value means an empty list).
# Unknown AMDL_* variables fail startup; fields pinned by an environment
# variable are rejected by PUT /api/v1/config with 422.

server:
  # string: API listen address in "host:port" form, for example "127.0.0.1:18080" or ":18080". Requires a restart.
  listen: "127.0.0.1:18080"

database:
  # string: SQLite database file path. Relative paths are resolved from the backend working directory. Requires a restart.
  path: "data/db/amdl.db"

logging:
  # enum: debug, info, warn, error. Records below this severity are discarded from every output.
  # Runtime-mutable through PUT /api/v1/config and manual-file reload; no restart required.
  level: "info"
  # enum: text, json. Applies to both console and rotating-file output. Requires a restart.
  format: "text"
  # bool: true writes logs to stdout; false disables console output. Requires a restart.
  console: true
  # bool: true includes the Go source file and line in each record; false omits it. Requires a restart.
  include_source: false
  # bool: true emits one structured record per completed HTTP request; false disables HTTP access records.
  # Panic recovery and X-Request-ID propagation remain active when false.
  # Runtime-mutable through PUT /api/v1/config and manual-file reload; no restart required.
  access_log: false
  # integer records: number of recent structured records retained for GET /api/v1/logs and its SSE stream.
  # 0 disables in-memory retention and the log APIs return an empty history; valid range: 0-100000. Requires a restart.
  buffer_size: 2000
  # bool: true writes to the rotating file below; false leaves file output disabled. Requires a restart.
  file_enabled: false
  # string path: active log file. Relative paths are resolved from the backend working directory. Requires a restart.
  file_path: "data/logs/amdl.log"
  # integer MiB: rotate the active file after it reaches this size; must be >= 1. Requires a restart.
  max_size_mb: 100
  # integer files: maximum old rotated files retained. 0 means no count-based limit. Requires a restart.
  max_backups: 7
  # integer days: maximum age of rotated files. 0 means no age-based limit. Requires a restart.
  max_age_days: 30
  # bool: true gzip-compresses rotated files; false keeps them uncompressed. Requires a restart.
  compress: true

wrapper:
  # string: wrapper-manager gRPC address in "host:port" form. Requires a restart.
  address: "127.0.0.1:8080"
  # bool: true uses plaintext gRPC; false uses TLS 1.2+ and verifies the wrapper certificate
  # against the operating system trust store and the hostname in address. Requires a restart.
  insecure: true
  # integer seconds: wrapper unary-RPC timeout and per-decrypt-fragment inactivity timeout.
  # It is not a whole-track deadline, so long tracks may run longer. Values <= 0 fall back to 30 seconds. Requires a restart.
  timeout_seconds: 30
  # integer seconds: wrapper login/2FA timeout. Values <= 0 fall back to 120 seconds. Requires a restart.
  login_timeout_seconds: 120

catalog:
  # The following catalog client and signing keys are startup-bound and require a restart.
  # string: default Apple Music storefront code used when an input URL has no region, for example "us", "cn", "jp".
  default_storefront: "cn"
  # string: Apple Music catalog language tag passed as the "l" query parameter, for example "en-US", "zh-Hans_CN", "ja-JP".
  language: "zh-Hans_CN"
  # integer: maximum Apple control-plane HTTP requests in flight across the whole process, including Catalog API,
  # web-player token discovery, Enhanced HLS manifests, and artwork. Positive values allow 1-64; values <=0 behave
  # as 1; values above 64 in this file or AMDL_CATALOG_MAX_PARALLEL_REQUESTS are clamped to 64. Default: 16.
  # This sizes a process-wide pool at startup; changing the file or environment variable requires a restart.
  max_parallel_requests: 16
  # integer requests/second: sustained process-wide Catalog API request rate. Positive values allow 1-64; values
  # <=0 behave as 1; values above 64 in this file or AMDL_CATALOG_REQUESTS_PER_SECOND are clamped to 64. Default: 10.
  # This rate limiter is fixed at startup; changing the file or environment variable requires a restart.
  requests_per_second: 10
  # integer requests: token-bucket burst capacity for Catalog API traffic. Positive values allow 1-64; values <=0
  # behave as 1; values above 64 in this file or AMDL_CATALOG_REQUEST_BURST are clamped to 64. Default: 16.
  # This rate limiter is fixed at startup; changing the file or environment variable requires a restart.
  request_burst: 16
  # Apple Music developer-token signing (all three keys form one unit):
  # - all three empty: signing disabled; the bearer token is auto-discovered from music.apple.com (legacy behavior)
  #     and catalog metadata is read from amp-api.music.apple.com with enhancedHls manifests.
  # - all three set: the backend signs its own 24h ES256 developer token at startup (fails to start on any signing error)
  #     and reads catalog metadata from the official api.music.apple.com. The self-signed token cannot read enhancedHls,
  #     so the Enhanced HLS master playlist source is controlled separately by signed_mode_hls_source below.
  # - only some set: startup fails with a configuration error.
  # string: filesystem path to the Apple Media Services .p8 private key (PKCS#8 ECDSA). Empty disables signing.
  apple_music_private_key_path: ""
  # string: the 10-character Key ID (kid) for the .p8 key. Empty disables signing.
  apple_music_key_id: ""
  # string: the 10-character Apple developer Team ID used as the token issuer (iss). Empty disables signing.
  apple_music_team_id: ""
  # integer hours: validity of developer tokens minted for external clients via GET /api/v1/developer-token.
  # Values <= 0 fall back to 1 hour. Only meaningful when signing is enabled (the endpoint returns 409 in legacy mode);
  # the backend's internal token always lasts 24h and is proactively refreshed after 12h, regardless of this value.
  developer_token_ttl_hours: 1
  # list of strings: web origins embedded as the JWT "origin" claim in tokens minted via GET /api/v1/developer-token,
  # for example ["https://player.example.com"]. With one or more entries, Apple rejects API requests whose Origin
  # header is not in the list. Empty list: no origin claim (token usable from any origin). Entries must be non-empty;
  # ignored in legacy mode and never applied to the backend's internal token.
  allowed_origins: []
  # integer hours: validity window for an auto-discovered bearer token (legacy mode only). The cached token is
  # proactively refreshed halfway through this window: for example, 12 refreshes after 6 hours. Values <= 0 use
  # a 12-hour window and refresh after 6 hours. Ignored when developer-token signing is enabled.
  token_cache_ttl_hours: 12
  # The following catalog behavior keys are runtime-mutable through PUT /api/v1/config
  # and manual-file reload; no restart is required.
  # enum: song, album. song means album URLs containing ?i= are single-song tasks; album downloads the full album.
  album_track_url_mode: "song"
  # string: optional global Apple Music subscription token (media-user-token) used as the fallback for station downloads
  # and private playlist covers. A download request may override it per job with overrides.media_user_token; omitting that
  # override uses this value, while an explicitly empty override clears this fallback for that job. This value may also be
  # exposed by GET /api/v1/config; protect this service at the deployment layer if the token is sensitive. Empty means no
  # global fallback.
  media_user_token: ""
  # enum: wrapper, web_token. Only meaningful when developer-token signing is enabled above (the self-signed token cannot
  # read enhancedHls); ignored in legacy mode, where enhancedHls already comes from the catalog response.
  # - wrapper (default): the Enhanced HLS master playlist comes from wrapper.M3U8 (the authorized device manifest).
  # - web_token: the backend scrapes a music.apple.com web-player JWT (same technique as legacy mode) and reads
  #     enhancedHls from amp-api.music.apple.com with that token, independent of the signed developer token used
  #     for catalog metadata. Use this if the wrapper cannot supply a usable device manifest.
  signed_mode_hls_source: "wrapper"

download:
  # quality_priority, codec_alternative, and memory_mode below are runtime-mutable;
  # they appear first to match the DownloadConfig field order.
  # list enum: alac, aac, aac-binaural, aac-downmix, ec3, ac3.
  # - alac: Apple Lossless Audio Codec
  # - aac: standard Enhanced HLS AAC
  # - aac-binaural: binaural AAC
  # - aac-downmix: Dolby downmix AAC
  # - ec3: Dolby Digital Plus / Dolby Atmos
  # - ac3: Dolby Digital
  # AAC-LC does not need to be listed; it is always appended as the final fallback.
  # Runtime-mutable through PUT /api/v1/config and manual-file reload; no restart required.
  quality_priority: ["alac"]
  # bool: true tries the next codec in quality_priority after failure; false only tries the first codec.
  # Runtime-mutable through PUT /api/v1/config and manual-file reload; no restart required.
  codec_alternative: true
  # enum: low, high. Controls the per-track RAM/disk trade-off for Enhanced HLS processing; default: low.
  # - low: streams encrypted Enhanced HLS media into a resumable checkpoint, then reads it fragment by fragment
  #     and decrypts directly into ffmpeg. The normal path uses bounded fragment-sized RAM; the encrypted
  #     checkpoint and flattened output can coexist in temp_dir, for roughly two track-sized files per parallel track.
  # - high: keeps one encrypted track in RAM and decrypts it fragment by fragment directly into ffmpeg. The live
  #     media payload per parallel track is roughly one encrypted track plus the current encrypted and plaintext
  #     fragments; pathological single-fragment media can approach three track sizes. The observed Go heap may
  #     temporarily approach about twice the track size (or more for unusually large fragments) because garbage
  #     collection retains allocation headroom; ffmpeg and runtime overhead are additional. Only the flattened
  #     output remains in temp_dir, so its peak is roughly one track per parallel track. In-memory media is limited
  #     to 512 MiB per track; larger enhanced-media responses fail explicitly instead of risking process OOM. If a
  #     CDN response has a usable ETag or Last-Modified validator and is interrupted after making progress, high
  #     mode retries one Range request from its in-memory prefix. It does not persist that prefix, so process or
  #     container restarts still begin at byte zero.
  # AAC-LC WebPlayback is unchanged by this option: both modes keep its encrypted retry buffer in memory (subject
  # to the same 512 MiB download limit) and stream gowidevine's decrypted output directly into ffmpeg instead of
  # retaining another plaintext []byte or input file. The Widevine parser may still hold decoded track structures
  # until that stream completes. The rare ALAC integrity-repair fallback also reads and copies one full flattened
  # track in either mode; the fragment-sized low-mode estimate applies to the normal path.
  # For the normal ffmpeg layout (media before a final moov), metadata tagging rewrites only a moov-plus-artwork
  # sized shell in temp_dir and another shell of similar size in the operating system temp directory. Unusual
  # compatible layouts fall back to go-mp4tag's legacy whole-track rewrite in the operating system temp directory.
  # Total RAM and temporary disk usage scale with the startup pools below (max_parallel_downloads /
  # max_parallel_decrypts). A per-task overrides.memory_mode may select a different mode without changing the
  # runtime default.
  # Runtime-mutable through PUT /api/v1/config and manual-file reload; no restart required.
  memory_mode: "low"
  # The following worker and process-wide pool sizes are startup-bound and require a restart.
  # integer: maximum concurrently running jobs; sizes the worker pool built at startup.
  # Positive values allow 1-32; values <=0 behave as 1; values above 32 in this file are
  # clamped to 32 (the config API rejects them). Default: 3.
  max_running_jobs: 3
  # integer: maximum media transfers in flight across all jobs. Positive values allow 1-64; values <=0 behave as 1;
  # values above 64 in this file or AMDL_DOWNLOAD_MAX_PARALLEL_DOWNLOADS are clamped to 64. Default: 16.
  # This sizes a process-wide pool at startup, cannot be overridden per job, and requires a restart to change.
  # Upgrade note: this replaces the removed max_parallel_tracks key; old configs must be edited or startup fails.
  max_parallel_downloads: 16
  # integer: maximum media decrypt operations in flight across all jobs. Positive values allow 1-64; values <=0
  # behave as 1; values above 64 in this file or AMDL_DOWNLOAD_MAX_PARALLEL_DECRYPTS are clamped to 64. Default: 32.
  # This sizes a process-wide pool at startup, cannot be overridden per job, and requires a restart to change.
  max_parallel_decrypts: 32
  # integer: maximum concurrent wrapper-manager data RPCs (M3U8, lyrics, web playback, license) across all jobs.
  # Positive values allow 1-64; values <=0 behave as 1; values above 64 in this file or
  # AMDL_DOWNLOAD_MAX_PARALLEL_WRAPPER_REQUESTS are clamped to 64. Default: 24.
  # Login/logout RPCs are exempt so operator access is never starved, and decrypt streams are
  # bounded by max_parallel_decrypts instead.
  # This sizes a process-wide pool at startup, cannot be overridden per job, and requires a restart to change.
  max_parallel_wrapper_requests: 24
  # The remaining download keys are runtime-mutable through PUT /api/v1/config
  # and manual-file reload; no restart is required.
  # integer: maximum total attempts (including the first) for metadata, cover, lyrics,
  # and each codec's download/decrypt phase. Positive values allow 1-10; values <=0 behave as 1;
  # values above 10 in this file are clamped to 10 (the config API and new job submissions reject them;
  # job overrides persisted before the limit existed are clamped when the job runs). Default: 3.
  max_attempts: 3
  # string path: root download directory. Relative paths are resolved from the backend working directory.
  downloads_dir: "data/downloads"
  # Per-task-type output path templates, relative to downloads_dir. Each is a single
  # "/"-separated path template, non-empty; the last segment is the file name and gets
  # the .m4a extension appended automatically. Every segment is sanitized independently,
  # so template values cannot create extra directories.
  # Variables: {SongId}, {SongNumber}, {SongName}, {ArtistName}, {UrlArtistName}, {ArtistId},
  # {AlbumName}, {AlbumId}, {AlbumArtist}, {ReleaseDate}, {ReleaseYear}, {UPC}, {Copyright},
  # {RecordLabel}, {DiscNumber}, {DiscCount}, {TrackNumber}, {TrackCount}, {PlaylistName},
  # {PlaylistId}, {StationName}, {StationId}, {Quality}, {Codec}, {Tag}. Numeric variables {SongNumber}, {DiscNumber},
  # {DiscCount}, {TrackNumber}, and {TrackCount} also support :02d padding, for example
  # {TrackNumber:02d}. Unknown variables are preserved literally.
  # In directory segments, {ArtistName} resolves to the collection's grouping artist
  # (album artist when available) so all tracks of a collection share one folder; in the
  # file-name segment it resolves to the track's own artist.
  # string template: output path for single-song tasks.
  song_path_format: "songs/{ArtistName}/{AlbumName}/{TrackNumber:02d}. {SongName}"
  # string template: output path for album tasks.
  album_path_format: "albums/{ArtistName}/{AlbumName}/{TrackNumber:02d}. {SongName}"
  # string template: output path for artist tasks (expanded album/song lists).
  artist_path_format: "artists/{ArtistName}/{AlbumName}/{TrackNumber:02d}. {SongName}"
  # string template: output path for playlist tasks. {SongNumber} is the 1-based position in the playlist.
  playlist_path_format: "playlists/{PlaylistName}/{SongNumber:02d}. {SongName}"
  # string template: output path for radio station (station/ra.xxxx) tasks. A station resolves to a
  # rolling next-tracks list, so it gets its own folder. {StationName}/{StationId} carry the station's
  # name/id; {SongNumber} is the 1-based position.
  station_path_format: "stations/{StationName}/{SongNumber:02d}. {SongName}"
  # string path: temporary media working directory. Relative paths are resolved from the backend working directory.
  # All disk-backed per-track scratch and the flattened/verified/tagged file are
  # staged here and only the finished file is
  # moved to downloads_dir. If temp_dir shares a filesystem with downloads_dir the
  # move is a cheap rename; if not, the finished file is copied across once. Put
  # temp_dir on fast local storage (e.g. SSD) to keep the flatten/verify/tag work
  # off a slower downloads volume. For Enhanced HLS, peak usage in this directory depends
  # on memory_mode: roughly two times one track's size per in-flight track in low mode,
  # or one track's size per in-flight track in high mode (in-flight tracks are bounded by
  # the startup pools above). AAC-LC uses roughly one track here in either mode.
  # The common metadata rewrite briefly uses only moov-plus-artwork sized shells in temp_dir and the operating
  # system temp directory; a compatible non-tail-moov layout can still use one track-sized legacy rewrite file.
  # Assumed single-writer: stale non-resumable scratch
  # in temp_dir is swept on startup. Encrypted HLS checkpoints (low mode) are grouped by
  # task: failed/recoverable tasks retain them for retry, while completed, cancelled,
  # and deleted tasks remove them.
  temp_dir: "data/tmp"
  # string: cover artwork size as "{width}x{height}", for example "5000x5000", "3000x3000", "1400x1400".
  cover_size: "5000x5000"
  # enum: jpg, jpeg, png.
  cover_format: "jpg"
  # bool: true embeds track cover art into the MP4 metadata; false skips embedded cover art.
  embed_cover: true
  # bool: true saves standalone album cover files for album downloads; false skips them.
  # The cover is written into the deepest directory segment of the task's path template
  # that references {AlbumName} or {AlbumId}; if no segment does, it is written next to the tracks.
  save_album_cover: true
  # bool: true saves standalone artist cover files when available; false skips them.
  # The cover is written into the deepest directory segment of the task's path template
  # that references {ArtistName}, {UrlArtistName}, {AlbumArtist}, or {ArtistId};
  # if no directory segment references the artist, the artist cover is skipped.
  save_artist_cover: true
  # bool: true saves standalone playlist cover files for playlist downloads; false skips them.
  save_playlist_cover: true
  # bool: true embeds converted lyrics into MP4 metadata; false skips embedded lyrics.
  embed_lyrics: true
  # bool: true writes a sidecar lyrics file next to the audio file; false skips sidecar lyrics files.
  save_lyrics_file: false
  # enum: lrc, ttml. lrc converts Apple TTML to LRC; ttml preserves wrapper-returned TTML.
  lyrics_format: "lrc"
  # enum: lyrics, syllable-lyrics. syllable-lyrics requests word-timed lyrics from compatible wrappers.
  lyrics_type: "lyrics"
  # list enum: translation, pronunciation. Empty list disables extra localized lines.
  lyrics_extras: []
  # integer Hz: maximum selected ALAC sample rate. Use 192000 for up to 192 kHz.
  alac_max_sample_rate: 192000
  # integer bits: maximum selected ALAC bit depth. Use 24 for up to 24-bit.
  alac_max_bit_depth: 24
  # bool: true verifies output MP4 integrity and repairs known ALAC terminator issues; false skips the integrity gate.
  check_integrity: true
  # bool: true overwrites an existing output file (and its lyrics sidecar) when
  # a job downloads the same track again; false (default) skips tracks whose
  # output file already exists. Can be overridden per submission via the
  # overrides.force_overwrite field of POST /api/v1/downloads.
  force_overwrite: false

tools:
  # string path or command name: ffmpeg executable. Used to flatten the
  # remuxed MP4 and to run the optional integrity check. All MP4 box/atom
  # operations (sample extraction, re-encapsulation, metadata, cover art) are
  # now handled in-process via the Go mp4ff/go-mp4tag libraries, so gpac,
  # MP4Box and the Bento4 tools (mp4extract/mp4edit) are no longer required.
  # Requires a restart.
  ffmpeg: "ffmpeg"

simulate:
  # All simulate keys are runtime-mutable through PUT /api/v1/config and
  # manual-file reload; no restart is required.
  # bool: true enables local test mode. The encrypted media transfer, decryption, remux, and disk
  # writes are simulated: nothing is downloaded or decrypted, ffmpeg is not needed, and no output
  # file is written. Catalog metadata and enhanced-HLS media selection still run for real, so
  # titles, albums, artwork, and the reported codec quality (bit depth / sample rate / bitrate) are
  # authentic values, and selection failures fall back through quality_priority exactly like a real
  # download. Every API response, job/item status, progress value, status message, and SSE event
  # matches a real download. The wrapper decryptor status/storefront check is skipped so jobs can be
  # submitted without a running wrapper; note that with developer-token signing enabled manifests
  # normally come from the wrapper, so without one selection falls back to a faked AAC-LC.
  # false runs real downloads.
  enabled: false
  # integer KB/s (kilobytes per second): lower bound of the randomized simulated transfer speed.
  # Must be >= 1 when simulate mode is enabled. Default: 512.
  min_speed_kbps: 512
  # integer KB/s (kilobytes per second): upper bound of the randomized simulated transfer speed.
  # Must be >= min_speed_kbps. Default: 4096.
  max_speed_kbps: 4096
