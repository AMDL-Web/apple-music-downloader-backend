# Every key in this file can be overridden with an environment variable named
# AMDL_<SECTION>_<KEY> (the yaml path uppercased, "_" as separator), for
# example AMDL_SERVER_LISTEN, AMDL_WRAPPER_ADDRESS, AMDL_DATABASE_PATH,
# AMDL_DOWNLOAD_QUALITY_PRIORITY. Overrides sit on top of the config file on
# every start and are not written back by the loader, so unsetting a variable
# restores the file value on the next start (PUT /api/v1/config still
# rewrites the whole file with the effective values, environment overrides
# included). Value syntax: strings verbatim, booleans true/false,
# integers as digits, string lists as comma-separated items (an empty value
# means an empty list). Unknown AMDL_* variables fail startup; fields pinned
# by an environment variable are rejected by PUT /api/v1/config with 422.

server:
  # string: API listen address in "host:port" form, for example "127.0.0.1:18080" or ":18080".
  listen: "127.0.0.1:18080"

database:
  # string: SQLite database file path. Relative paths are resolved from the backend working directory.
  path: "data/db/amdl.db"

logging:
  # enum: debug, info, warn, error. Records below this severity are discarded from every output.
  # Runtime-mutable through PUT /api/v1/config and manual-file reload; no restart required.
  level: "info"
  # enum: text, json. Applies to both console and rotating-file output. Requires a restart.
  format: "text"
  # bool: true writes logs to stdout; false disables console output. Requires a restart.
  console: true
  # bool: true includes the Go source file and line in each record; false omits it. Requires a restart.
  include_source: false
  # bool: true emits one structured record per completed HTTP request; false disables HTTP access records.
  # Panic recovery and X-Request-ID propagation remain active when false. Runtime-mutable; no restart required.
  access_log: false
  # integer records: number of recent structured records retained for GET /api/v1/logs and its SSE stream.
  # 0 disables in-memory retention and the log APIs return an empty history; valid range: 0-100000. Requires a restart.
  buffer_size: 2000
  # bool: true writes to the rotating file below; false leaves file output disabled. Requires a restart.
  file_enabled: false
  # string path: active log file. Relative paths are resolved from the backend working directory. Requires a restart.
  file_path: "data/logs/amdl.log"
  # integer MiB: rotate the active file after it reaches this size; must be >= 1. Requires a restart.
  max_size_mb: 100
  # integer files: maximum old rotated files retained. 0 means no count-based limit. Requires a restart.
  max_backups: 7
  # integer days: maximum age of rotated files. 0 means no age-based limit. Requires a restart.
  max_age_days: 30
  # bool: true gzip-compresses rotated files; false keeps them uncompressed. Requires a restart.
  compress: true

wrapper:
  # string: wrapper-manager gRPC address in "host:port" form.
  address: "127.0.0.1:8080"
  # bool: true uses insecure gRPC transport; false requires transport credentials support in code/config.
  insecure: true
  # integer seconds: wrapper RPC timeout. Values <= 0 fall back to 30 seconds.
  timeout_seconds: 30
  # integer seconds: wrapper login/2FA timeout. Values <= 0 fall back to 120 seconds.
  login_timeout_seconds: 120

catalog:
  # string: default Apple Music storefront code used when an input URL has no region, for example "us", "cn", "jp".
  default_storefront: "cn"
  # string: Apple Music catalog language tag passed as the "l" query parameter, for example "en-US", "zh-Hans_CN", "ja-JP".
  language: "zh-Hans_CN"
  # Apple Music developer-token signing (all three keys form one unit):
  # - all three empty: signing disabled; the bearer token is auto-discovered from music.apple.com (legacy behavior)
  #     and catalog metadata is read from amp-api.music.apple.com with enhancedHls manifests.
  # - all three set: the backend signs its own 24h ES256 developer token at startup (fails to start on any signing error),
  #     reads catalog metadata from the official api.music.apple.com, and sources every audio manifest from wrapper.M3U8
  #     (enhancedHls is not accessible with a self-signed token).
  # - only some set: startup fails with a configuration error.
  # string: filesystem path to the Apple Media Services .p8 private key (PKCS#8 ECDSA). Empty disables signing.
  apple_music_private_key_path: ""
  # string: the 10-character Key ID (kid) for the .p8 key. Empty disables signing.
  apple_music_key_id: ""
  # string: the 10-character Apple developer Team ID used as the token issuer (iss). Empty disables signing.
  apple_music_team_id: ""
  # integer hours: validity of developer tokens minted for external clients via GET /api/v1/developer-token.
  # Values <= 0 fall back to 1 hour. Only meaningful when signing is enabled (the endpoint returns 409 in legacy mode);
  # the backend's internal token always lasts 24h regardless of this value.
  developer_token_ttl_hours: 1
  # list of strings: web origins embedded as the JWT "origin" claim in tokens minted via GET /api/v1/developer-token,
  # for example ["https://player.example.com"]. With one or more entries, Apple rejects API requests whose Origin
  # header is not in the list. Empty list: no origin claim (token usable from any origin). Entries must be non-empty;
  # ignored in legacy mode and never applied to the backend's internal token.
  allowed_origins: []
  # integer hours: cached auto-discovered bearer-token TTL (legacy mode only). Values <= 0 fall back to 12 hours.
  # Ignored when developer-token signing is enabled (the signed token always expires 24h after issuance).
  token_cache_ttl_hours: 12
  # enum: song, album. song means album URLs containing ?i= are single-song tasks; album downloads the full album.
  album_track_url_mode: "song"

download:
  # list enum: alac, aac, aac-binaural, aac-downmix, ec3, ac3.
  # - alac: Apple Lossless Audio Codec
  # - aac: standard Enhanced HLS AAC
  # - aac-binaural: binaural AAC
  # - aac-downmix: Dolby downmix AAC
  # - ec3: Dolby Digital Plus / Dolby Atmos
  # - ac3: Dolby Digital
  # AAC-LC does not need to be listed; it is always appended as the final fallback.
  quality_priority: ["alac"]
  # bool: true tries the next codec in quality_priority after failure; false only tries the first codec.
  codec_alternative: true
  # integer: maximum concurrently running jobs. Values <= 0 currently behave as the downloader manager default.
  max_running_jobs: 3
  # integer: maximum tracks downloaded in parallel per collection. Values <= 0 fall back to 1.
  max_parallel_tracks: 5
  # integer: maximum total attempts (including the first) for metadata, cover, lyrics,
  # and each codec's download/decrypt phase. Values <= 0 behave as 1 (single attempt, no retry).
  max_attempts: 3
  # string path: root download directory. Relative paths are resolved from the backend working directory.
  downloads_dir: "data/downloads"
  # Per-task-type output path templates, relative to downloads_dir. Each is a single
  # "/"-separated path template, non-empty; the last segment is the file name and gets
  # the .m4a extension appended automatically. Every segment is sanitized independently,
  # so template values cannot create extra directories.
  # Variables: {SongId}, {SongNumber}, {SongName}, {ArtistName}, {UrlArtistName}, {ArtistId},
  # {AlbumName}, {AlbumId}, {AlbumArtist}, {ReleaseDate}, {ReleaseYear}, {UPC}, {Copyright},
  # {RecordLabel}, {DiscNumber}, {DiscCount}, {TrackNumber}, {TrackCount}, {PlaylistName},
  # {PlaylistId}, {Quality}, {Codec}, {Tag}. Numeric variables {SongNumber}, {DiscNumber},
  # {DiscCount}, {TrackNumber}, and {TrackCount} also support :02d padding, for example
  # {TrackNumber:02d}. Unknown variables are preserved literally.
  # In directory segments, {ArtistName} resolves to the collection's grouping artist
  # (album artist when available) so all tracks of a collection share one folder; in the
  # file-name segment it resolves to the track's own artist.
  # string template: output path for single-song tasks.
  song_path_format: "songs/{ArtistName}/{AlbumName}/{TrackNumber:02d}. {SongName}"
  # string template: output path for album tasks.
  album_path_format: "albums/{ArtistName}/{AlbumName}/{TrackNumber:02d}. {SongName}"
  # string template: output path for artist tasks (expanded album/song lists).
  artist_path_format: "artists/{ArtistName}/{AlbumName}/{TrackNumber:02d}. {SongName}"
  # string template: output path for playlist tasks. {SongNumber} is the 1-based position in the playlist.
  playlist_path_format: "playlists/{PlaylistName}/{SongNumber:02d}. {SongName}"
  # string path: temporary media working directory. Relative paths are resolved from the backend working directory.
  # All per-track scratch (encrypted download, streamed decrypt output, and the
  # flattened/verified/tagged file) is staged here and only the finished file is
  # moved to downloads_dir. If temp_dir shares a filesystem with downloads_dir the
  # move is a cheap rename; if not, the finished file is copied across once. Put
  # temp_dir on fast local storage (e.g. SSD) to keep the flatten/verify/tag work
  # off a slower downloads volume. Peak usage is up to roughly three times one
  # track's size per parallel track (see max_parallel_tracks): during flatten the
  # encrypted download, the decrypted fragmented MP4, and the flattened output
  # briefly coexist. Assumed single-writer: stale scratch is swept on startup.
  temp_dir: "data/tmp"
  # string: cover artwork size as "{width}x{height}", for example "5000x5000", "3000x3000", "1400x1400".
  cover_size: "5000x5000"
  # enum: jpg, jpeg, png.
  cover_format: "jpg"
  # bool: true embeds track cover art into the MP4 metadata; false skips embedded cover art.
  embed_cover: true
  # bool: true saves standalone album cover files for album downloads; false skips them.
  # The cover is written into the deepest directory segment of the task's path template
  # that references {AlbumName} or {AlbumId}; if no segment does, it is written next to the tracks.
  save_album_cover: true
  # bool: true saves standalone artist cover files when available; false skips them.
  # The cover is written into the deepest directory segment of the task's path template
  # that references {ArtistName}, {UrlArtistName}, {AlbumArtist}, or {ArtistId};
  # if no directory segment references the artist, the artist cover is skipped.
  save_artist_cover: true
  # bool: true saves standalone playlist cover files for playlist downloads; false skips them.
  save_playlist_cover: true
  # bool: true embeds converted lyrics into MP4 metadata; false skips embedded lyrics.
  embed_lyrics: true
  # bool: true writes a sidecar lyrics file next to the audio file; false skips sidecar lyrics files.
  save_lyrics_file: false
  # enum: lrc, ttml. lrc converts Apple TTML to LRC; ttml preserves wrapper-returned TTML.
  lyrics_format: "lrc"
  # enum: lyrics, syllable-lyrics. syllable-lyrics requests word-timed lyrics from compatible wrappers.
  lyrics_type: "lyrics"
  # list enum: translation, pronunciation. Empty list disables extra localized lines.
  lyrics_extras: []
  # integer Hz: maximum selected ALAC sample rate. Use 192000 for up to 192 kHz.
  alac_max_sample_rate: 192000
  # integer bits: maximum selected ALAC bit depth. Use 24 for up to 24-bit.
  alac_max_bit_depth: 24
  # bool: true verifies output MP4 integrity and repairs known ALAC terminator issues; false skips the integrity gate.
  check_integrity: true

tools:
  # string path or command name: ffmpeg executable. Used to flatten the
  # remuxed MP4 and to run the optional integrity check. All MP4 box/atom
  # operations (sample extraction, re-encapsulation, metadata, cover art) are
  # now handled in-process via the Go mp4ff/go-mp4tag libraries, so gpac,
  # MP4Box and the Bento4 tools (mp4extract/mp4edit) are no longer required.
  ffmpeg: "ffmpeg"

simulate:
  # bool: true enables local test mode. The encrypted media transfer, decryption, remux, and disk
  # writes are simulated: nothing is downloaded or decrypted, ffmpeg is not needed, and no output
  # file is written. Catalog metadata and enhanced-HLS media selection still run for real, so
  # titles, albums, artwork, and the reported codec quality (bit depth / sample rate / bitrate) are
  # authentic values, and selection failures fall back through quality_priority exactly like a real
  # download. Every API response, job/item status, progress value, status message, and SSE event
  # matches a real download. The wrapper decryptor status/storefront check is skipped so jobs can be
  # submitted without a running wrapper; note that with developer-token signing enabled manifests
  # normally come from the wrapper, so without one selection falls back to a faked AAC-LC.
  # false runs real downloads.
  enabled: false
  # integer KB/s (kilobytes per second): lower bound of the randomized simulated transfer speed.
  # Must be >= 1 when simulate mode is enabled. Default: 512.
  min_speed_kbps: 512
  # integer KB/s (kilobytes per second): upper bound of the randomized simulated transfer speed.
  # Must be >= min_speed_kbps. Default: 4096.
  max_speed_kbps: 4096
